<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exam Practice Tool</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<style>
  :root{
    --bg:#f6f5f2; --panel:#ffffff; --ink:#1f2422; --muted:#6b7370; --line:#e3e0d8;
    --accent:#2f6f5e; --accent-ink:#ffffff;
    --good:#2f7d4f; --good-bg:#e9f6ee;
    --bad:#b3462c; --bad-bg:#fbeae5;
    --chip:#eef1ee;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Iowan Old Style","Georgia",serif;background:var(--bg);color:var(--ink);}
  .wrap{max-width:760px;margin:0 auto;padding:28px 20px 80px;}
  h1{font-size:1.5rem;letter-spacing:.02em;margin:0 0 4px;font-weight:600;}
  .sub{color:var(--muted);font-size:.92rem;margin-bottom:22px;}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px 24px;margin-bottom:18px;box-shadow:0 1px 2px rgba(0,0,0,.03);}
  .toplinks{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;font-family:system-ui,sans-serif;font-size:.82rem;}
  .toplinks button{background:var(--chip);border:1px solid var(--line);color:var(--ink);padding:6px 12px;border-radius:20px;cursor:pointer;}
  .toplinks button.active{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);}

  .mode-row{display:flex;justify-content:flex-end;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px;font-family:system-ui,sans-serif;}
  .status-bar{font-size:.82rem;color:var(--muted);display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .status-bar .email{color:var(--ink);font-weight:600;}
  .link-btn{background:none;border:none;color:var(--accent);cursor:pointer;font-family:system-ui,sans-serif;font-size:.82rem;padding:0;text-decoration:underline;}

  .progress-row{display:flex;justify-content:space-between;align-items:center;font-family:system-ui,sans-serif;font-size:.8rem;color:var(--muted);margin-bottom:10px;}
  .bar{height:6px;background:var(--line);border-radius:4px;overflow:hidden;margin-bottom:22px;}
  .bar-fill{height:100%;background:var(--accent);transition:width .25s ease;}

  .qnum{font-family:system-ui,sans-serif;font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);font-weight:600;margin-bottom:8px;}
  .qtext{font-size:1.18rem;line-height:1.5;margin-bottom:20px;}

  .opt{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border:1px solid var(--line);border-radius:10px;margin-bottom:10px;cursor:pointer;font-size:1rem;line-height:1.45;transition:border-color .15s, background .15s;background:var(--panel);}
  .opt:hover{border-color:var(--accent);}
  .opt .letter{font-family:system-ui,sans-serif;font-weight:700;font-size:.82rem;color:var(--muted);min-width:20px;}
  .opt.selected{border-color:var(--accent);background:#eef6f2;}
  .opt.selected .letter{color:var(--accent);}
  .opt.correct{border-color:var(--good);background:var(--good-bg);}
  .opt.correct .letter{color:var(--good);}
  .opt.incorrect{border-color:var(--bad);background:var(--bad-bg);}
  .opt.incorrect .letter{color:var(--bad);}

  .nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:22px;font-family:system-ui,sans-serif;}
  .btn{font-family:system-ui,sans-serif;border:none;border-radius:8px;padding:10px 18px;font-size:.92rem;font-weight:600;cursor:pointer;}
  .btn-primary{background:var(--accent);color:var(--accent-ink);}
  .btn-primary:disabled{background:#c7cfca;cursor:not-allowed;}
  .btn-ghost{background:none;color:var(--muted);border:1px solid var(--line);}
  .btn-ghost:hover{color:var(--ink);border-color:var(--ink);}

  .flag-btn{font-family:system-ui,sans-serif;font-size:.78rem;background:none;border:1px solid var(--line);color:var(--muted);padding:5px 10px;border-radius:20px;cursor:pointer;}
  .flag-btn.on{background:#f6e6c8;border-color:#d8ae4e;color:#7a5a10;}

  .dotgrid{display:flex;flex-wrap:wrap;gap:6px;margin-top:18px;}
  .dot{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:system-ui,sans-serif;font-size:.72rem;font-weight:600;border:1px solid var(--line);cursor:pointer;background:var(--panel);color:var(--muted);}
  .dot.current{border-color:var(--accent);color:var(--accent);}
  .dot.answered{background:var(--chip);color:var(--ink);}
  .dot.flagged{box-shadow:inset 0 -3px 0 #d8ae4e;}

  .score-big{font-size:2.6rem;font-weight:700;text-align:center;margin:6px 0;}
  .score-sub{text-align:center;color:var(--muted);font-family:system-ui,sans-serif;font-size:.88rem;margin-bottom:6px;}
  .result-actions{display:flex;gap:10px;justify-content:center;margin-top:18px;flex-wrap:wrap;font-family:system-ui,sans-serif;}

  textarea{width:100%;min-height:220px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:.82rem;border:1px solid var(--line);border-radius:10px;padding:12px;resize:vertical;}
  .format-help{font-family:system-ui,sans-serif;font-size:.8rem;color:var(--muted);background:var(--chip);border-radius:10px;padding:12px 14px;margin-bottom:14px;white-space:pre-wrap;line-height:1.5;}
  .file-row{font-family:system-ui,sans-serif;font-size:.85rem;margin-bottom:14px;}
  .msg{font-family:system-ui,sans-serif;font-size:.85rem;margin-top:10px;}
  .msg.err{color:var(--bad);}
  .msg.ok{color:var(--good);}

  h2{font-size:1.05rem;margin:0 0 12px;}
  h3{font-size:.95rem;margin:0 0 10px;font-family:system-ui,sans-serif;}
  .review-item{border-bottom:1px solid var(--line);padding:14px 0;}
  .review-item:last-child{border-bottom:none;}
  .review-q{font-size:1rem;margin-bottom:8px;}
  .review-line{font-family:system-ui,sans-serif;font-size:.85rem;margin-bottom:3px;}
  .review-line.correct-line{color:var(--good);}
  .review-line.wrong-line{color:var(--bad);}
  .review-explanation{font-size:.85rem;margin-top:6px;padding:8px 10px;background:var(--chip);border-radius:6px;color:var(--muted);}
  .all-correct{text-align:center;font-family:system-ui,sans-serif;color:var(--good);padding:10px 0;}

  .subsection{border-top:1px solid var(--line);margin-top:18px;padding-top:18px;}
  .lib-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;}
  .lib-info{display:flex;flex-direction:column;gap:2px;}
  .lib-title{font-size:1rem;}
  .lib-meta{font-family:system-ui,sans-serif;font-size:.78rem;color:var(--muted);}
  .subsection:first-child{border-top:none;margin-top:0;padding-top:0;}
</style>
</head>
<body>
<div class="wrap">
  <h1 id="examTitle">Exam Practice Tool</h1>
  <div class="sub" id="examSub">Loading…</div>

  <div id="authView" style="display:none">
    <div class="panel" id="authPanel"></div>
  </div>

  <div id="appShell" style="display:none">
    <div class="mode-row">
      <div class="status-bar" id="statusBar"></div>
    </div>

    <div class="toplinks">
      <button id="tabQuiz" class="active">Take Exam</button>
      <button id="tabLibrary">Test Library</button>
      <button id="tabFlash">Flashcards</button>
      <button id="tabProgress" style="display:none">Progress</button>
      <button id="tabAdmin" style="display:none">Admin</button>
    </div>

    <div id="quizView">
      <div class="panel" id="quizPanel"></div>
      <div class="panel" id="dotsPanel"></div>
    </div>

    <div id="resultsView" style="display:none">
      <div class="panel" id="resultsPanel"></div>
      <div class="panel" id="reviewPanel"></div>
    </div>

    <div id="libraryView" style="display:none">
      <div class="panel subsection">
        <h2>Test Library</h2>
        <div class="format-help">All 25 practice exams are ready to go.</div>
        <div id="libraryList"></div>
      </div>
    </div>

    <div id="flashView" style="display:none">
      <div class="panel" id="flashPanel"></div>
    </div>

    <div id="progressView" style="display:none">
      <div class="panel" id="progressPanel"></div>
    </div>

    <div id="adminView" style="display:none">
      <div class="panel" id="adminPanel"></div>
    </div>
  </div>
</div>

<script>
/* ================= exam library data ================= */
let EXAM_LIBRARY = [];

/* ================= state ================= */
let exam = null;
let answers = {};
let flags = {};
let current = 0;
let submitted = false;
let currentAttempt = 1;
let flashcards = [];
let flashIndex = 0;
let flashSelectedOption = null; // null = unanswered; otherwise the clicked option index, revealing the correct answer
let reviewFilter = 'missed'; // 'missed' | 'all' — which questions renderReviewPanel shows
let progressReviewFilter = 'missed'; // 'missed' | 'all' — same idea, for renderProgressAttemptDetail
let flashProgressMsg = null; // { text, ok } | null
let flashOnlineAttempts = null; // null = not yet loaded; [] | [{attemptId,examTitle,roundNumber,attemptNumber,scope,correctCount,totalQuestions}]
let flashAttemptsLoading = false;
let flashSelectedAttemptIds = new Set();
let flashPickOpen = false;

/* ================= elements ================= */
const quizPanel = document.getElementById('quizPanel');
const dotsPanel = document.getElementById('dotsPanel');
const resultsPanel = document.getElementById('resultsPanel');
const reviewPanel = document.getElementById('reviewPanel');
const examTitle = document.getElementById('examTitle');
const examSub = document.getElementById('examSub');
const flashPanel = document.getElementById('flashPanel');
const libraryList = document.getElementById('libraryList');
const authPanel = document.getElementById('authPanel');
const progressPanel = document.getElementById('progressPanel');
const statusBar = document.getElementById('statusBar');

const quizView = document.getElementById('quizView');
const resultsView = document.getElementById('resultsView');
const flashView = document.getElementById('flashView');
const libraryView = document.getElementById('libraryView');
const authView = document.getElementById('authView');
const progressView = document.getElementById('progressView');
const adminView = document.getElementById('adminView');
const adminPanel = document.getElementById('adminPanel');
const appShell = document.getElementById('appShell');
const tabQuiz = document.getElementById('tabQuiz');
const tabFlash = document.getElementById('tabFlash');
const tabLibrary = document.getElementById('tabLibrary');
const tabProgress = document.getElementById('tabProgress');
const tabAdmin = document.getElementById('tabAdmin');

tabQuiz.onclick = () => showView('quiz');
tabFlash.onclick = () => showView('flash');
tabLibrary.onclick = () => showView('library');
tabAdmin.onclick = () => showView('admin');

/* Only the top-level "tab" screens get a real URL -- 'auth' is
   session-driven (applyAccessGate forces it regardless of URL) and the
   in-progress-quiz/results states are reachable only through '/' and
   would spam history if routed per-question. */
const PATH_FOR_VIEW = { quiz: '/', library: '/library', flash: '/flashcards', progress: '/progress', admin: '/admin' };
const VIEW_FOR_PATH = { '/': 'quiz', '/library': 'library', '/flashcards': 'flash', '/progress': 'progress', '/admin': 'admin' };

function showView(v, opts){
  opts = opts || {};
  quizView.style.display = v==='quiz' && !submitted ? 'block':'none';
  resultsView.style.display = v==='quiz' && submitted ? 'block':'none';
  flashView.style.display = v==='flash' ? 'block':'none';
  libraryView.style.display = v==='library' ? 'block':'none';
  authView.style.display = v==='auth' ? 'block':'none';
  progressView.style.display = v==='progress' ? 'block':'none';
  adminView.style.display = v==='admin' ? 'block':'none';
  tabQuiz.classList.toggle('active', v==='quiz');
  tabFlash.classList.toggle('active', v==='flash');
  tabLibrary.classList.toggle('active', v==='library');
  tabProgress.classList.toggle('active', v==='progress');
  tabAdmin.classList.toggle('active', v==='admin');
  if(v==='quiz' && submitted) renderResults();
  if(v==='flash'){
    renderFlashcard();
    /* Always refetch on entry (mirrors renderProgressView's unconditional
       refetch below) so a just-finished exam shows up immediately without
       needing a manual page reload to invalidate a cache. */
    if(currentUser && !flashAttemptsLoading) loadFlashOnlineAttempts();
  }
  if(v==='library') renderLibrary();
  if(v==='auth') renderAuthView();
  if(v==='progress') renderProgressView();
  if(v==='admin') renderAdminView();

  const path = PATH_FOR_VIEW[v];
  if(path && !opts.fromPopState && location.pathname !== path){
    history.pushState({view: v}, '', path);
  }
}

/* Back/forward: map the URL back to a view and re-show it without pushing
   a new entry. Ignored while signed out/ungated (appShell hidden) -- there's
   nothing routable to show yet, and applyAccessGate owns that screen. */
window.addEventListener('popstate', ()=>{
  if(appShell.style.display === 'none') return;
  let v = VIEW_FOR_PATH[location.pathname] || 'quiz';
  if(v === 'admin' && !(profile && profile.role === 'admin')) v = 'quiz';
  showView(v, { fromPopState: true });
});

function renderLibrary(){
  libraryList.innerHTML = EXAM_LIBRARY.map((e,idx)=>{
    return `
      <div class="lib-row">
        <div class="lib-info">
          <div class="lib-title">${escapeHtml(e.title)}</div>
          <div class="lib-meta">${e.questions.length} questions</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
          <button class="btn btn-primary" data-idx="${idx}">Start</button>
        </div>
      </div>
    `;
  }).join('');
  libraryList.querySelectorAll('button[data-idx]').forEach(btn=>{
    btn.onclick = async ()=>{
      const e = EXAM_LIBRARY[parseInt(btn.dataset.idx,10)];
      try{
        await beginTrackedAttempt({ title: e.title, questions: e.questions, examKey: 'lib:' + slugify(e.title) }, 'full', null);
      } catch(err){
        alert('Could not start this exam online: ' + err.message);
      }
    };
  });
}

/* attemptNumber: the attempt this exam load represents. Defaults to 1 (fresh test).
   Only set explicitly when the exam was reconstructed from an uploaded answer-sheet PDF. */
function loadExam(examData, attemptNumber){
  exam = examData;
  answers = {}; flags = {}; current = 0; submitted = false;
  currentAttempt = attemptNumber || 1;
  examTitle.textContent = exam.title;
  examSub.textContent = (exam.subtitle ? exam.subtitle + " · " : "") + exam.questions.length + " questions";
  dotsPanel.style.display = '';
  showView('quiz');
  renderQuestion();
  renderDots();
}

/* ================= quiz rendering ================= */
function renderQuestion(){
  const q = exam.questions[current];
  const total = exam.questions.length;
  const answeredCount = Object.keys(answers).length;
  const letters = ['1','2','3','4','5','6'];
  const qNum = q.originalNumber || (current+1);

  /* This progress line is "how far through THIS session am I" (position,
     bounded by total), separate from the "qnum" div below it which is the
     original exam's question number -- qNum here made "Question 8 of 2"
     show up on any narrowed retake, mixing an original number that can
     exceed the retake's own size with a total it was never counted against. */
  let html = `
    <div class="progress-row">
      <span>Question ${current+1} of ${total}</span>
      <span>${answeredCount} answered</span>
    </div>
    <div class="bar"><div class="bar-fill" style="width:${(answeredCount/total*100).toFixed(1)}%"></div></div>
    <div class="qnum">Question ${qNum}</div>
    <div class="qtext">${escapeHtml(q.text)}</div>
  `;

  q.options.forEach((opt, i) => {
    const sel = answers[current] === i;
    html += `<div class="opt ${sel?'selected':''}" data-i="${i}">
      <span class="letter">${letters[i]}</span><span>${escapeHtml(opt)}</span>
    </div>`;
  });

  html += `
    <div class="nav-row">
      <button class="btn btn-ghost" id="prevBtn" ${current===0?'disabled':''}>← Previous</button>
      <button class="flag-btn ${flags[current]?'on':''}" id="flagBtn">${flags[current]?'🚩 Flagged':'Flag for review'}</button>
      ${current===total-1
        ? `<button class="btn btn-primary" id="submitBtn">Submit Exam</button>`
        : `<button class="btn btn-primary" id="nextBtn">Next →</button>`}
    </div>
  `;
  if(current !== total-1){
    html += `
      <div style="text-align:center;margin-top:10px;font-family:system-ui,sans-serif;">
        <button class="btn btn-ghost" id="endEarlyBtn">End Exam Now</button>
      </div>
    `;
  }

  quizPanel.innerHTML = html;

  quizPanel.querySelectorAll('.opt').forEach(el=>{
    el.onclick = ()=>{ answers[current] = parseInt(el.dataset.i); syncOnlineAnswer(current); renderQuestion(); renderDots(); };
  });
  const prevBtn = document.getElementById('prevBtn');
  if(prevBtn) prevBtn.onclick = ()=>{ current=Math.max(0,current-1); renderQuestion(); renderDots(); };
  const nextBtn = document.getElementById('nextBtn');
  if(nextBtn) nextBtn.onclick = ()=>{ current=Math.min(total-1,current+1); renderQuestion(); renderDots(); };
  document.getElementById('flagBtn').onclick = ()=>{ flags[current]=!flags[current]; syncOnlineAnswer(current); renderQuestion(); renderDots(); };
  const submitBtn = document.getElementById('submitBtn');
  if(submitBtn) submitBtn.onclick = doSubmit;
  const endEarlyBtn = document.getElementById('endEarlyBtn');
  if(endEarlyBtn) endEarlyBtn.onclick = doSubmit;
}

function renderDots(){
  const total = exam.questions.length;
  let html = '<div class="dotgrid">';
  for(let i=0;i<total;i++){
    let cls = 'dot';
    if(i===current) cls += ' current';
    if(answers[i]!==undefined) cls += ' answered';
    if(flags[i]) cls += ' flagged';
    html += `<div class="${cls}" data-i="${i}">${exam.questions[i].originalNumber || (i+1)}</div>`;
  }
  html += '</div>';
  dotsPanel.innerHTML = html;
  dotsPanel.querySelectorAll('.dot').forEach(el=>{
    el.onclick = ()=>{ current = parseInt(el.dataset.i); renderQuestion(); renderDots(); };
  });
}

/* ================= submit / results (no grading until now) ================= */
function showConfirmDialog(message, onConfirm, confirmLabel, danger){
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(31,36,34,.4);display:flex;align-items:center;justify-content:center;z-index:9999;font-family:system-ui,sans-serif;padding:20px;';
  const okColor = danger ? '#b3401f' : '#2f6f5e';
  overlay.innerHTML = `
    <div style="background:#fff;border-radius:12px;padding:22px 24px;max-width:360px;box-shadow:0 8px 30px rgba(0,0,0,.25);">
      <div style="font-size:.95rem;line-height:1.5;margin-bottom:18px;color:#1f2422;">${escapeHtml(message)}</div>
      <div style="display:flex;gap:10px;justify-content:flex-end;">
        <button id="confirmCancelBtn" style="font-family:system-ui,sans-serif;border:1px solid #e3e0d8;background:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:.88rem;">Cancel</button>
        <button id="confirmOkBtn" style="font-family:system-ui,sans-serif;border:none;background:${okColor};color:#fff;border-radius:8px;padding:8px 14px;cursor:pointer;font-weight:600;font-size:.88rem;">${escapeHtml(confirmLabel || 'End Exam')}</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelector('#confirmCancelBtn').onclick = ()=> overlay.remove();
  overlay.querySelector('#confirmOkBtn').onclick = ()=>{ overlay.remove(); onConfirm(); };
  overlay.addEventListener('click', (e)=>{ if(e.target===overlay) overlay.remove(); });
}

function doSubmit(){
  const totalQ = exam.questions.length;
  const unanswered = totalQ - Object.keys(answers).length;
  const finish = async ()=>{ await completeTrackedAttempt(); submitted = true; reviewFilter = 'missed'; showView('quiz'); };
  if(unanswered > 0){
    showConfirmDialog(`You have ${unanswered} unanswered question(s) remaining. End the exam and see your results now?`, finish);
  } else {
    finish();
  }
}

function getMissedIndices(){
  const missed = [];
  exam.questions.forEach((q,i)=>{ if(answers[i] !== q.correct) missed.push(i); });
  return missed;
}

function renderResults(){
  const total = exam.questions.length;
  const missed = getMissedIndices();
  const correctCount = total - missed.length;

  /* On a missed-only retake, `total` is just the retake subset's size — the
     percentage should instead reflect cumulative mastery against the whole
     original exam (originalTotal - stillMissed, same numbers the Progress
     tab already shows for a round), not just this subset. Falls back to the
     plain attempt score when there's no active round (untracked exam). */
  const round = (appMode === 'online' && currentUser) ? activeOnlineRound : activeOfflineRound;
  const originalTotal = round ? (round.originalTotal ?? round.original_total) : total;
  const funnelMissed = round ? (round.funnelMissedCount ?? round.funnel_missed_count) : missed.length;
  const masteredSoFar = originalTotal - funnelMissed;
  const pct = ((masteredSoFar/originalTotal)*100).toFixed(1);
  const isRetake = originalTotal !== total;
  const roundNumber = round ? (round.roundNumber ?? round.round_number) : null;
  const today = new Date().toLocaleDateString();

  resultsPanel.innerHTML = `
    <h2>Results</h2>
    <div class="score-big">${pct}%</div>
    <div class="score-sub">${masteredSoFar} of ${originalTotal} mastered${isRetake ? ` · ${correctCount}/${total} correct this attempt` : ''} · ${today} · Attempt #${currentAttempt}</div>
    <div class="result-actions">
      <button class="btn btn-ghost" id="retakeBtn">Retake Full Exam</button>
      ${missed.length>0 ? `<button class="btn btn-ghost" id="retakeMissedBtn">Retake Missed Only (${missed.length})</button>` : ``}
    </div>
  `;
  document.getElementById('retakeBtn').onclick = async ()=>{
    /* "Retake Full Exam" abandons any in-progress round for this exam and starts the next one */
    if(appMode === 'online' && currentUser && exam.examKey){
      if(activeOnlineRound && activeOnlineRound.status==='in_progress') await onlineStore.abandonRound(activeOnlineRound.id);
      const round = await onlineStore.createRound(exam.examKey, exam.title, exam.questions.length, activeOnlineRound ? activeOnlineRound.round_number : 0);
      activeOnlineRound = round;
      activeOnlineAttempt = await onlineStore.createAttemptWithQuestions(round.id, 1, 'full', null, exam.questions);
    } else if(exam.examKey){
      if(activeOfflineRound && activeOfflineRound.status==='in_progress') activeOfflineRound.status = 'abandoned';
      activeOfflineRound = funnelEngine.startRound(exam.examKey, exam.title, exam.questions.length, offlineRounds);
      offlineRounds.push(activeOfflineRound);
      activeOfflineAttempt = funnelEngine.startAttempt(activeOfflineRound, exam.questions, 'full', null);
    }
    answers = {}; flags = {}; current = 0; submitted = false; showView('quiz'); renderQuestion(); renderDots();
  };
  const retakeMissedBtn = document.getElementById('retakeMissedBtn');
  if(retakeMissedBtn){
    retakeMissedBtn.onclick = async ()=>{
      if(appMode === 'online' && currentUser && activeOnlineRound && exam.examKey){
        const missedQs = missed.map(i=>({...exam.questions[i], originalNumber: exam.questions[i].originalNumber || (i+1)}));
        const sourceAttemptId = activeOnlineAttempt ? activeOnlineAttempt.id : null;
        const nextAttemptNumber = (activeOnlineAttempt ? activeOnlineAttempt.attempt_number : 0) + 1;
        activeOnlineAttempt = await onlineStore.createAttemptWithQuestions(activeOnlineRound.id, nextAttemptNumber, 'missed_retake', sourceAttemptId, missedQs);
        loadExam({ title: "Retake — Missed Questions", subtitle: "from " + exam.title, questions: missedQs, examKey: exam.examKey }, nextAttemptNumber);
        return;
      }
      const missedQs = (activeOfflineAttempt && activeOfflineAttempt.status==='completed')
        ? funnelEngine.missedQuestionsForNextAttempt(activeOfflineAttempt)
        : missed.map(i=>({...exam.questions[i], originalNumber: exam.questions[i].originalNumber || (i+1)}));
      const sourceAttemptNumber = activeOfflineAttempt ? activeOfflineAttempt.attemptNumber : null;
      let nextAttemptNumber = 1;
      if(activeOfflineRound && exam.examKey){
        activeOfflineAttempt = funnelEngine.startAttempt(activeOfflineRound, missedQs, 'missed_retake', sourceAttemptNumber);
        nextAttemptNumber = activeOfflineAttempt.attemptNumber;
      }
      loadExam({ title: "Retake — Missed Questions", subtitle: "from " + exam.title, questions: missedQs, examKey: exam.examKey }, nextAttemptNumber);
    };
  }
  renderReviewPanel(missed, total);
}

/* questions/answers come from the live `exam`/`answers` globals when reviewing
   a just-finished attempt, or can be passed explicitly to review a past
   attempt's snapshot (used by the online progress-tracking view later). */
function renderReviewList(indices, questions, answersMap){
  questions = questions || exam.questions;
  answersMap = answersMap || answers;
  const letters = ['1','2','3','4','5','6'];
  if(indices.length===0){
    return `<div class="all-correct">Perfect score — nothing to review. 🎉</div>`;
  }
  let html = '';
  indices.forEach(i=>{
    const q = questions[i];
    const userAns = answersMap[i];
    html += `<div class="review-item">
      <div class="review-q">${q.originalNumber || (i+1)}. ${escapeHtml(q.text)}</div>`;
    q.options.forEach((opt, oi)=>{
      let cls = '';
      let tag = '';
      if(oi === q.correct){ cls = 'correct-line'; tag = ' ✓ correct answer'; }
      else if(oi === userAns){ cls = 'wrong-line'; tag = ' — your answer'; }
      html += `<div class="review-line ${cls}">${letters[oi]}) ${escapeHtml(opt)}${tag}</div>`;
    });
    if(userAns===undefined){
      html += `<div class="review-line wrong-line">Not answered</div>`;
    }
    if(q.explanation){
      html += `<div class="review-explanation"><strong>Explanation:</strong> ${escapeHtml(q.explanation)}</div>`;
    }
    html += `</div>`;
  });
  return html;
}

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}


/* ================= online flashcards: generate from stored progress =================
   Pulls every missed question (selected_option !== correct_option) from any
   completed attempt straight from Supabase, so a user can build a flashcard
   set covering any stage of failure across one or more tests without a
   downloaded PDF answer sheet. Attempts are loaded once per Flashcards-tab
   visit and grouped by exam in the picker below — checking an exam's group
   header selects every attempt under it, or individual attempts can be
   combined freely across different exams. */
async function loadFlashOnlineAttempts(){
  flashAttemptsLoading = true;
  renderFlashcard();
  try{
    const { data: rounds, error: rErr } = await supabaseClient.from('exam_rounds')
      .select('id, exam_title, round_number').eq('user_id', currentUser.id);
    if(rErr) throw rErr;
    if(!rounds.length){ flashOnlineAttempts = []; return; }
    const roundMap = new Map(rounds.map(r=>[r.id, r]));
    const { data: attempts, error: aErr } = await supabaseClient.from('exam_attempts')
      .select('id, round_id, attempt_number, attempt_scope, correct_count, total_questions')
      .in('round_id', rounds.map(r=>r.id)).eq('status','completed').order('attempt_number');
    if(aErr) throw aErr;
    flashOnlineAttempts = attempts.map(a=>{
      const round = roundMap.get(a.round_id) || { exam_title: 'Unknown exam', round_number: '?' };
      return {
        attemptId: a.id,
        examTitle: round.exam_title,
        roundNumber: round.round_number,
        attemptNumber: a.attempt_number,
        scope: a.attempt_scope,
        correctCount: a.correct_count,
        totalQuestions: a.total_questions
      };
    }).sort((a,b)=> a.examTitle.localeCompare(b.examTitle) || a.roundNumber - b.roundNumber || a.attemptNumber - b.attemptNumber);
    flashSelectedAttemptIds = new Set(flashOnlineAttempts.map(a=>a.attemptId));
  } catch(err){
    flashOnlineAttempts = [];
    flashProgressMsg = { text: 'Could not load your attempts: ' + err.message, ok:false };
  } finally {
    flashAttemptsLoading = false;
    renderFlashcard();
  }
}

/* Supabase/PostgREST caps an unordered .select() at 1000 rows -- any bulk
   attempt_id lookup can silently truncate once a user's total answer-row
   count crosses that (hit in testing at 1252 rows for one real account, so
   this isn't a hypothetical edge case). Page through with .range() instead
   of trusting a single request to return everything. */
async function fetchAllByIn(table, column, values, select){
  let rows = [];
  for(let from=0; ; from+=1000){
    const { data: page, error } = await supabaseClient.from(table).select(select).in(column, values).range(from, from+999);
    if(error) throw error;
    rows = rows.concat(page);
    if(page.length < 1000) break;
  }
  return rows;
}

/* Shared by both generation paths below — the only difference between
   "all progress" and "selected attempts" is which attempt_id list is passed in. */
async function buildFlashcardsFromAttemptIds(attemptIds, scopeMsg){
  if(!attemptIds.length) throw new Error('No completed attempts found — nothing to build flashcards from yet.');
  const rows = await fetchAllByIn('exam_attempt_answers', 'attempt_id', attemptIds, '*');
  const tally = new Map();
  rows.forEach(r=>{
    if(r.selected_option===null || r.selected_option===undefined) return;
    if(r.selected_option === r.correct_option) return;
    const key = r.question_text.trim().toLowerCase();
    if(tally.has(key)) tally.get(key).count++;
    else tally.set(key, { text: r.question_text, options: r.options, correct: r.correct_option, count: 1 });
  });
  if(tally.size === 0) throw new Error('No missed questions found — nothing to build flashcards from.');
  flashcards = Array.from(tally.values()).sort((a,b)=>b.count - a.count);
  flashIndex = 0;
  flashSelectedOption = null;
  flashProgressMsg = { text: `Built ${flashcards.length} flashcard(s) from ${attemptIds.length} completed attempt(s) ${scopeMsg}.`, ok:true };
}

async function generateFlashcardsFromOnlineProgress(){
  const allIds = (flashOnlineAttempts||[]).map(a=>a.attemptId);
  flashProgressMsg = { text: 'Generating flashcards from your progress…', ok:true };
  renderFlashcard();
  try{
    await buildFlashcardsFromAttemptIds(allIds, 'across all your exams');
  } catch(err){
    flashProgressMsg = { text: err.message, ok:false };
  }
  renderFlashcard();
}

/* "Final" = the highest attempt_number seen per (exam, round) -- the most
   recent retake of that round's funnel, i.e. what you're still missing
   right now rather than every historical miss (which "All Attempts" covers
   instead, deliberately re-counting a question you've since gotten right
   on a later retake). examTitle+roundNumber uniquely identifies a round
   per the DB's (user_id, exam_key, round_number) constraint. */
function finalAttemptIdsFromOnline(){
  const byRound = new Map();
  (flashOnlineAttempts||[]).forEach(a=>{
    const key = a.examTitle + '|' + a.roundNumber;
    const cur = byRound.get(key);
    if(!cur || a.attemptNumber > cur.attemptNumber) byRound.set(key, a);
  });
  return Array.from(byRound.values()).map(a=>a.attemptId);
}

async function generateFlashcardsFromFinalAttempts(){
  const finalIds = finalAttemptIdsFromOnline();
  flashProgressMsg = { text: 'Generating flashcards from your progress…', ok:true };
  renderFlashcard();
  try{
    await buildFlashcardsFromAttemptIds(finalIds, 'from your most recent attempt in each round');
  } catch(err){
    flashProgressMsg = { text: err.message, ok:false };
  }
  renderFlashcard();
}

async function generateFlashcardsFromSelectedAttempts(attemptIds){
  if(!attemptIds.length){
    flashProgressMsg = { text: 'Select at least one attempt first.', ok:false };
    renderFlashcard();
    return;
  }
  flashProgressMsg = { text: 'Generating flashcards from your progress…', ok:true };
  renderFlashcard();
  try{
    await buildFlashcardsFromAttemptIds(attemptIds, `from the ${attemptIds.length} attempt(s) selected`);
  } catch(err){
    flashProgressMsg = { text: err.message, ok:false };
  }
  renderFlashcard();
}

function bindFlashGeneratorHandlers(){
  const genFinalBtn = document.getElementById('flashGenerateFinalBtn');
  const genAllBtn = document.getElementById('flashGenerateAllBtn');
  const toggleBtn = document.getElementById('flashTogglePickBtn');
  const selAllBtn = document.getElementById('flashSelectAllBtn');
  const selNoneBtn = document.getElementById('flashSelectNoneBtn');
  const genSelectedBtn = document.getElementById('flashGenerateSelectedBtn');
  if(genFinalBtn) genFinalBtn.onclick = ()=> generateFlashcardsFromFinalAttempts();
  if(genAllBtn) genAllBtn.onclick = ()=> generateFlashcardsFromOnlineProgress();
  if(toggleBtn) toggleBtn.onclick = ()=>{ flashPickOpen = !flashPickOpen; renderFlashcard(); };
  if(selAllBtn) selAllBtn.onclick = ()=>{ flashSelectedAttemptIds = new Set((flashOnlineAttempts||[]).map(a=>a.attemptId)); renderFlashcard(); };
  if(selNoneBtn) selNoneBtn.onclick = ()=>{ flashSelectedAttemptIds = new Set(); renderFlashcard(); };
  if(genSelectedBtn) genSelectedBtn.onclick = ()=> generateFlashcardsFromSelectedAttempts(Array.from(flashSelectedAttemptIds));
  flashPanel.querySelectorAll('[data-flash-attempt]').forEach(cb=>{
    cb.onchange = ()=>{
      const id = cb.dataset.flashAttempt;
      if(cb.checked) flashSelectedAttemptIds.add(id); else flashSelectedAttemptIds.delete(id);
      renderFlashcard(); // re-render so the group header checkbox reflects the new state
    };
  });
  flashPanel.querySelectorAll('[data-flash-exam-group]').forEach(cb=>{
    if(cb.dataset.indeterminate === 'true') cb.indeterminate = true;
    cb.onchange = ()=>{
      const examTitle = cb.dataset.flashExamGroup;
      const groupAttempts = (flashOnlineAttempts||[]).filter(a=>a.examTitle===examTitle);
      if(cb.checked) groupAttempts.forEach(a=>flashSelectedAttemptIds.add(a.attemptId));
      else groupAttempts.forEach(a=>flashSelectedAttemptIds.delete(a.attemptId));
      renderFlashcard();
    };
  });
}

function shuffleFlashcards(){
  for(let i=flashcards.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [flashcards[i], flashcards[j]] = [flashcards[j], flashcards[i]];
  }
  flashIndex = 0;
  flashSelectedOption = null;
  renderFlashcard();
}

function renderFlashcard(){
  const topHtml = currentUser ? renderOnlineFlashGeneratorHtml() : '';
  if(!flashcards.length){
    flashPanel.innerHTML = topHtml + `<h2>Flashcards</h2><div class="format-help">No flashcards yet. Generate a set from your progress above.</div>`;
    if(currentUser) bindFlashGeneratorHandlers();
    return;
  }
  const letters = ['1','2','3','4','5','6'];
  const card = flashcards[flashIndex];
  let html = `
    <div class="progress-row">
      <span>Card ${flashIndex+1} of ${flashcards.length}</span>
      <span>Missed ${card.count} time${card.count===1?'':'s'}</span>
    </div>
    <div class="qtext">${escapeHtml(card.text)}</div>
  `;
  const answered = flashSelectedOption !== null;
  card.options.forEach((opt,oi)=>{
    let cls = '';
    let tag = '';
    if(answered){
      if(oi===card.correct){ cls = 'correct'; tag = ' ✓'; }
      else if(oi===flashSelectedOption){ cls = 'incorrect'; tag = ' — your answer'; }
    }
    html += `<div class="opt ${cls}" ${answered?'':`data-flash-opt="${oi}"`}>
      <span class="letter">${letters[oi]}</span><span>${escapeHtml(opt)}${tag}</span>
    </div>`;
  });
  html += `
    <div class="nav-row">
      <button class="btn btn-ghost" id="flashPrevBtn" ${flashIndex===0?'disabled':''}>← Previous</button>
      <button class="btn btn-ghost" id="flashNextBtn" ${flashIndex===flashcards.length-1?'disabled':''}>Next →</button>
    </div>
  `;
  if(flashcards.length>1){
    html += `<div style="margin-top:10px;text-align:center;"><button class="link-btn" id="flashShuffleBtn" type="button">🔀 Shuffle order</button></div>`;
  }
  flashPanel.innerHTML = topHtml + html;
  document.getElementById('flashPrevBtn').onclick = ()=>{ if(flashIndex>0){ flashIndex--; flashSelectedOption=null; renderFlashcard(); } };
  document.getElementById('flashNextBtn').onclick = ()=>{ if(flashIndex<flashcards.length-1){ flashIndex++; flashSelectedOption=null; renderFlashcard(); } };
  if(!answered){
    flashPanel.querySelectorAll('[data-flash-opt]').forEach(el=>{
      el.onclick = ()=>{ flashSelectedOption = parseInt(el.dataset.flashOpt,10); renderFlashcard(); };
    });
  }
  const shuffleBtn = document.getElementById('flashShuffleBtn');
  if(shuffleBtn) shuffleBtn.onclick = shuffleFlashcards;
  if(currentUser) bindFlashGeneratorHandlers();
}

/* ================= SHARED: round/attempt funnel engine =================
   Pure functions, no DOM/network calls — a "round" is one full attempt at an
   exam followed by narrowing missed-only retakes until cumulative correct/
   total across that funnel reaches 98%+. Used identically by offline (below)
   and online (added later) persistence. */
function slugify(s){
  return (s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
}

/* Explanations get added/edited in EXAM_LIBRARY after attempts have already
   been taken and snapshotted (see createAttemptWithQuestions/recordAnswers).
   Rather than re-snapshotting, past-attempt review looks the current
   explanation up live by exam key + exact question text, falling back to
   whatever was frozen at attempt time if the question isn't found (custom/
   uploaded exams aren't in EXAM_LIBRARY at all, so this just no-ops there). */
function libraryExplanationLookup(examKey){
  const entry = (typeof EXAM_LIBRARY !== 'undefined' ? EXAM_LIBRARY : []).find(e=>'lib:'+slugify(e.title)===examKey);
  if(!entry) return null;
  const map = new Map();
  entry.questions.forEach(q=>{ if(q.explanation) map.set(q.text, q.explanation); });
  return map;
}
function newCustomExamId(){
  return (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : (Date.now() + '-' + Math.random().toString(36).slice(2));
}
const MASTERY_THRESHOLD = 0.98;
const funnelEngine = {
  startRound(examKey, examTitle, originalTotal, existingRounds){
    const priorNumbers = existingRounds.filter(r=>r.examKey===examKey).map(r=>r.roundNumber);
    const roundNumber = priorNumbers.length ? Math.max(...priorNumbers) + 1 : 1;
    const now = new Date().toISOString();
    return {
      examKey, examTitle, roundNumber, status: 'in_progress',
      originalTotal, funnelMissedCount: originalTotal, masteredAt: null,
      createdAt: now, updatedAt: now, attempts: []
    };
  },
  startAttempt(round, questions, scope, sourceAttemptNumber){
    return {
      attemptNumber: round.attempts.length + 1, scope, sourceAttemptNumber: sourceAttemptNumber || null,
      totalQuestions: questions.length, correctCount: 0, status: 'in_progress',
      startedAt: new Date().toISOString(), completedAt: null, answers: []
    };
  },
  recordAnswers(attempt, questions, answersMap, flagsMap){
    attempt.answers = questions.map((q,i)=>({
      questionIndex: i, text: q.text, options: q.options, correct: q.correct,
      explanation: q.explanation || '', originalNumber: q.originalNumber || (i+1),
      selected: answersMap[i]===undefined ? null : answersMap[i],
      flagged: !!flagsMap[i]
    }));
    attempt.correctCount = attempt.answers.filter(a=>a.selected===a.correct).length;
  },
  completeAttempt(round, attempt){
    attempt.status = 'completed';
    attempt.completedAt = new Date().toISOString();
    round.attempts.push(attempt);
    round.updatedAt = attempt.completedAt;
    const stillMissed = attempt.answers.filter(a=>a.selected!==a.correct).length;
    round.funnelMissedCount = stillMissed;
    if((round.originalTotal - stillMissed) / round.originalTotal >= MASTERY_THRESHOLD){
      round.status = 'mastered';
      round.masteredAt = attempt.completedAt;
    }
  },
  missedQuestionsForNextAttempt(attempt){
    return attempt.answers.filter(a=>a.selected!==a.correct)
      .map(a=>({ text: a.text, options: a.options, correct: a.correct, explanation: a.explanation, originalNumber: a.originalNumber }));
  }
};

/* ================= OFFLINE MODE: round tracking + save/load JSON file =================
   Purely in-memory bookkeeping alongside the existing offline flow — no new
   prompts or interruptions are added to offline mode itself. It only exists
   so "Save Progress to File" has real round/attempt history to export, using
   the same schema an online account exports (see cross-mode JSON below). */
let offlineRounds = [];
let activeOfflineRound = null;
let activeOfflineAttempt = null;
const CROSS_MODE_SCHEMA_VERSION = 1;

/* Starts a brand-new round (fresh full attempt) for examData and loads it via
   the existing, unmodified loadExam(). Used by every "start a full exam"
   entry point (library, pasted/uploaded text). */
async function beginTrackedAttempt(examData, scope, sourceAttemptNumber){
  if(appMode === 'online' && currentUser){
    await beginOnlineAttempt(examData);
    return;
  }
  if(examData.examKey){
    activeOfflineRound = funnelEngine.startRound(examData.examKey, examData.title, examData.questions.length, offlineRounds);
    offlineRounds.push(activeOfflineRound);
    activeOfflineAttempt = funnelEngine.startAttempt(activeOfflineRound, examData.questions, scope, sourceAttemptNumber);
  } else {
    activeOfflineRound = null;
    activeOfflineAttempt = null;
  }
  loadExam(examData);
}

/* Finds the latest in-progress round for examKey, or starts one — used when
   resuming a missed-question retake from a source (PDF upload) that doesn't
   carry an in-memory round reference from this session. */
function ensureActiveRound(examKey, examTitle, fallbackOriginalTotal){
  let round = offlineRounds.slice().reverse().find(r=>r.examKey===examKey && r.status==='in_progress');
  if(!round){
    round = funnelEngine.startRound(examKey, examTitle, fallbackOriginalTotal, offlineRounds);
    offlineRounds.push(round);
  }
  activeOfflineRound = round;
  return round;
}

/* Called from doSubmit()'s finish() — snapshots answers into the active
   attempt and recomputes round mastery. No-ops silently if this exam wasn't
   started through a tracked entry point (defensive, never blocks offline use). */
async function completeTrackedAttempt(){
  if(appMode === 'online' && currentUser){
    await completeOnlineAttempt();
    return;
  }
  if(!activeOfflineRound || !activeOfflineAttempt) return;
  funnelEngine.recordAnswers(activeOfflineAttempt, exam.questions, answers, flags);
  funnelEngine.completeAttempt(activeOfflineRound, activeOfflineAttempt);
}

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ================= ONLINE MODE: auth state & views ================= */
let appMode = 'online'; // always 'online' now -- offline mode lives only in the separate offline app
let currentUser = null;
let profile = null; // this account's row from `profiles` -- { approved, role, ... } or null
let libraryLoaded = false;
let libraryLoading = false;
let authScreen = 'signin'; // 'signin' | 'signup' | 'forgot' | 'reset-password' | 'verify-notice'
let authError = '';
let authMessage = '';
let turnstileWidgetId = null;

/* Turnstile's script only auto-renders .cf-turnstile elements present at
   script-load time — since the sign-up form is injected later via
   innerHTML, the widget must be rendered explicitly. */
function renderTurnstileWidget(){
  const container = document.getElementById('turnstileWidget');
  if(!container) return;
  if(window.turnstile){
    turnstileWidgetId = window.turnstile.render(container, { sitekey: TURNSTILE_SITE_KEY });
  } else {
    setTimeout(renderTurnstileWidget, 200);
  }
}

  /* Signed in but not (yet, or no longer) approved -- show neither the

  if(currentUser && profile && profile.approved !== true && profile.role !== 'admin'){

      <h2>Awaiting Approval</h2>

    html = `
      <h2>Create Account</h2>

        <button class="btn btn-primary" id="authSubmitBtn">Sign Up</button>
      </div>
      <div style="margin-top:14px;font-family:system-ui,sans-serif;font-size:.85rem;">

      <h2>Reset Password</h2>

      ${authMessage ? `<div class="msg ok">${escapeHtml(authMessage)}</div>` : ''}
      <div style="display:flex;flex-direction:column;gap:10px;font-family:system-ui,sans-serif;max-width:340px;">
        <input type="email" id="authEmail" placeholder="Email" autocomplete="email">
        <div class="cf-turnstile" id="turnstileWidget"></div>
        <button class="btn btn-primary" id="authSubmitBtn">Send Reset Link</button>

      <div style="margin-top:14px;font-family:system-ui,sans-serif;font-size:.85rem;">
        <button class="link-btn" id="goSigninBtn">Back to sign in</button>
      </div>
    `;
  } else if(authScreen === 'reset-password'){
    html = `
      <h2>Choose a New Password</h2>

        <button class="btn btn-primary" id="authSubmitBtn">Update Password</button>

async function handleAuthSubmit(){
  authError = '';
  const submitBtn = document.getElementById('authSubmitBtn');
  submitBtn.disabled = true;
  try{
    if(authScreen === 'signin'){
      const email = document.getElementById('authEmail').value.trim();
      const password = document.getElementById('authPassword').value;
      const turnstileToken = (window.turnstile && turnstileWidgetId!==null) ? window.turnstile.getResponse(turnstileWidgetId) : null;
      if(!turnstileToken){ throw new Error('Please complete the CAPTCHA challenge.'); }
      const { error } = await supabaseClient.auth.signInWithPassword({ email, password, options: { captchaToken: turnstileToken } });
      if(error) throw error;
      /* onAuthStateChange's SIGNED_IN handler takes it from here */
    } else if(authScreen === 'signup'){
      const email = document.getElementById('authEmail').value.trim();
      const password = document.getElementById('authPassword').value;
      const turnstileToken = (window.turnstile && turnstileWidgetId!==null) ? window.turnstile.getResponse(turnstileWidgetId) : null;
      if(!turnstileToken){ throw new Error('Please complete the CAPTCHA challenge.'); }
      const { data, error } = await supabaseClient.auth.signUp({ email, password, options: { captchaToken: turnstileToken } });
      if(error) throw error;
      /* Supabase never returns an error for a duplicate signup (anti-enumeration:
         it won't reveal whether an email is registered) — it silently returns a
         fake user object with no confirmation email sent instead. The one
         documented signal for an already-confirmed account is an empty
         identities array; an empty/undefined array on a brand-new signup would
         mean something else broke, so this check only fires for the real
         duplicate-account case. */
      if(data?.user && Array.isArray(data.user.identities) && data.user.identities.length === 0){
        throw new Error('An account with this email already exists. Try signing in instead.');
      }
      authScreen = 'verify-notice';
      authMessage = email;
      renderAuthView();
      return;
    } else if(authScreen === 'forgot'){
      const email = document.getElementById('authEmail').value.trim();
      const turnstileToken = (window.turnstile && turnstileWidgetId!==null) ? window.turnstile.getResponse(turnstileWidgetId) : null;
      if(!turnstileToken){ throw new Error('Please complete the CAPTCHA challenge.'); }
      const { error } = await supabaseClient.auth.resetPasswordForEmail(email, { captchaToken: turnstileToken, redirectTo: window.location.href.split('#')[0] });
      if(error) throw error;
      authMessage = 'Reset link sent — check your email.';
      renderAuthView();
      return;
    } else if(authScreen === 'reset-password'){
      const newPassword = document.getElementById('authNewPassword').value;
      const { error } = await supabaseClient.auth.updateUser({ password: newPassword });
      if(error) throw error;
      authScreen = 'signin';
      authMessage = 'Password updated — sign in with your new password.';
      renderAuthView();
      return;
    }
  } catch(err){
    authError = err.message;
    renderAuthView();
  }
}

function renderStatusBar(){
  if(appMode !== 'online' || !currentUser){

  statusBar.innerHTML = `<span class="email">${escapeHtml(currentUser.email)}</span><button class="link-btn" id="signOutBtn">Sign Out</button><button class="link-btn" id="deleteAccountBtn" style="color:var(--bad);">Delete Account</button>`;
  document.getElementById('signOutBtn').onclick = handleSignOut;
  document.getElementById('deleteAccountBtn').onclick = handleDeleteAccount;
