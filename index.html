async function handleAuthSubmit(){
  authError = '';
  const submitBtn = document.getElementById('authSubmitBtn');
  submitBtn.disabled = true;
  try{
    if(authScreen === 'signin'){
      const email = document.getElementById('authEmail').value.trim();
      const password = document.getElementById('authPassword').value;
      const turnstileToken = (window.turnstile && turnstileWidgetId!==null) ? window.turnstile.getResponse(turnstileWidgetId) : null;
      if(!turnstileToken){ throw new Error('Please complete the CAPTCHA challenge.'); }
      const { error } = await supabaseClient.auth.signInWithPassword({ email, password, options: { captchaToken: turnstileToken } });
      if(error) throw error;
      /* onAuthStateChange's SIGNED_IN handler takes it from here */
    } else if(authScreen === 'signup'){
      const email = document.getElementById('authEmail').value.trim();
      const password = document.getElementById('authPassword').value;
      const turnstileToken = (window.turnstile && turnstileWidgetId!==null) ? window.turnstile.getResponse(turnstileWidgetId) : null;
      if(!turnstileToken){ throw new Error('Please complete the CAPTCHA challenge.'); }
      const { data, error } = await supabaseClient.auth.signUp({ email, password, options: { captchaToken: turnstileToken } });
      if(error) throw error;
      /* Supabase never returns an error for a duplicate signup (anti-enumeration:
         it won't reveal whether an email is registered) — it silently returns a
         fake user object with no confirmation email sent instead. The one
         documented signal for an already-confirmed account is an empty
         identities array; an empty/undefined array on a brand-new signup would
         mean something else broke, so this check only fires for the real
         duplicate-account case. */
      if(data?.user && Array.isArray(data.user.identities) && data.user.identities.length === 0){
        throw new Error('An account with this email already exists. Try signing in instead.');
      }
      authScreen = 'verify-notice';
      authMessage = email;
      renderAuthView();
      return;
    } else if(authScreen === 'forgot'){
      const email = document.getElementById('authEmail').value.trim();
      const turnstileToken = (window.turnstile && turnstileWidgetId!==null) ? window.turnstile.getResponse(turnstileWidgetId) : null;
      if(!turnstileToken){ throw new Error('Please complete the CAPTCHA challenge.'); }
      const { error } = await supabaseClient.auth.resetPasswordForEmail(email, { captchaToken: turnstileToken, redirectTo: window.location.href.split('#')[0] });
      if(error) throw error;
      authMessage = 'Reset link sent — check your email.';
      renderAuthView();
      return;
    } else if(authScreen === 'reset-password'){
      const newPassword = document.getElementById('authNewPassword').value;
      const { error } = await supabaseClient.auth.updateUser({ password: newPassword });
      if(error) throw error;
      /* updateUser() succeeding leaves the recovery link's session fully
         valid -- without an explicit sign-out here, currentUser stays set,
         and the next event that re-triggers applyAccessGate() (Supabase
         refreshes tokens in the background on its own, so one will fire
         even with nobody touching anything) finds that still-valid session
         and logs the person straight into the app, skipping the "sign in
         with your new password" step entirely. Same reason as
         handleSignOut(): the success message has to be set AFTER
         applyAccessGate() runs, not before, or its signed-out branch wipes
         it right back out. */
      await supabaseClient.auth.signOut();
      currentUser = null;
      profile = null;
      await applyAccessGate();
      authScreen = 'signin';
      authMessage = 'Password updated — sign in with your new password.';
      renderAuthView();
      return;
    }
  } catch(err){
    authError = err.message;
    renderAuthView();
  }
}

function renderStatusBar(){
  if(appMode !== 'online' || !currentUser){
    statusBar.innerHTML = '';
    tabProgress.style.display = 'none';
    return;
  }
  statusBar.innerHTML = `
    <div class="account-menu">
      <button class="menu-trigger" id="accountMenuBtn" aria-label="Account menu" aria-haspopup="true" aria-expanded="false">⋮</button>
      <div class="account-dropdown" id="accountDropdown" hidden>
        <div class="account-email">${escapeHtml(currentUser.email)}</div>
        <button class="link-btn" id="signOutBtn">Sign Out</button>
        <button class="link-btn" id="deleteAccountBtn" style="color:var(--bad);">Delete Account</button>
      </div>
    </div>
  `;
  document.getElementById('signOutBtn').onclick = handleSignOut;
  document.getElementById('deleteAccountBtn').onclick = handleDeleteAccount;
  setupPopoverMenu('accountMenuBtn', 'accountDropdown');
  tabProgress.style.display = '';
}

/* Hardened confirmation for an irreversible action — requires typing DELETE,
   not just a click, since a normal confirm dialog is too easy to click through.
   message/buttonLabel let this be reused for the admin's "delete another
   account" path, not just self-deletion. */
/* targetEmail is raw, untrusted text (an account's email) -- escaped here,
   internally, rather than trusting callers to pre-build safe HTML. A
   caller previously built the <strong>-wrapped message itself and handed
   it in pre-escaped, but that string round-trips through a button's
   data-* attribute first (see the admin delete-user handler below), and
   reading a data attribute back via .dataset automatically un-escapes
   HTML entities -- so an already-escaped email came back out raw here,
   right before being inserted via innerHTML with no second escaping pass. */
function askDeleteAccountConfirmation(targetEmail, buttonLabel){
  const message = targetEmail
    ? `This permanently deletes <strong>${escapeHtml(targetEmail)}</strong>'s account and all its saved progress — there's no undo. Type <strong>DELETE</strong> to confirm.`
    : "This permanently deletes your account and all saved progress — there's no undo. Type <strong>DELETE</strong> to confirm.";
  buttonLabel = buttonLabel || 'Delete My Account';
  return new Promise(resolve=>{
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(31,36,34,.4);display:flex;align-items:center;justify-content:center;z-index:9999;font-family:system-ui,sans-serif;padding:20px;';
    overlay.innerHTML = `
      <div style="background:#fff;border-radius:12px;padding:22px 24px;max-width:380px;box-shadow:0 8px 30px rgba(0,0,0,.25);">
        <div style="font-size:.95rem;line-height:1.5;margin-bottom:14px;color:#1f2422;">${message}</div>
        <input type="text" id="deleteConfirmInput" style="width:100%;padding:9px 12px;border-radius:8px;border:1px solid #e3e0d8;font-family:system-ui,sans-serif;margin-bottom:14px;box-sizing:border-box;">
        <div style="display:flex;gap:10px;justify-content:flex-end;">
          <button id="deleteCancelBtn" style="font-family:system-ui,sans-serif;border:1px solid #e3e0d8;background:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:.88rem;">Cancel</button>
          <button id="deleteConfirmBtn" style="font-family:system-ui,sans-serif;border:none;background:#b3462c;color:#fff;border-radius:8px;padding:8px 14px;cursor:pointer;font-weight:600;font-size:.88rem;" disabled>${buttonLabel}</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    const input = overlay.querySelector('#deleteConfirmInput');
    const confirmBtn = overlay.querySelector('#deleteConfirmBtn');
    input.oninput = ()=>{ confirmBtn.disabled = input.value.trim() !== 'DELETE'; };
    overlay.querySelector('#deleteCancelBtn').onclick = ()=>{ overlay.remove(); resolve(false); };
    confirmBtn.onclick = ()=>{ if(input.value.trim()==='DELETE'){ overlay.remove(); resolve(true); } };
    overlay.addEventListener('click', (e)=>{ if(e.target===overlay){ overlay.remove(); resolve(false); } });
  });
}

async function handleDeleteAccount(){
  const confirmed = await askDeleteAccountConfirmation();
  if(!confirmed) return;
  try{
    const { error } = await supabaseClient.rpc('delete_my_account');
    if(error) throw error;
  } catch(err){
    alert('Could not delete account: ' + err.message);
    return;
  }
  /* The RPC deletes the auth.users row (cascading all app data via the FKs
     in the migration) but doesn't invalidate the already-issued access
     token — explicitly sign out and clear local state right away rather
     than relying on the token dying on its own. */
  await supabaseClient.auth.signOut();
  currentUser = null;
  profile = null;
  libraryLoaded = false;
  EXAM_LIBRARY = [];
  activeOnlineRound = null;
  activeOnlineAttempt = null;
  appMode = 'online';
  flashProgressMsg = null;
  flashOnlineAttempts = null;
  flashSelectedAttemptIds = new Set();
  flashPickOpen = false;
  if(location.pathname !== '/') history.pushState({view: 'quiz'}, '', '/'); // see the matching comment in handleSignOut
  await applyAccessGate();
  alert('Your account and all saved progress have been deleted.');
}

async function handleSignOut(reason){
  stopInactivityWatch();
  await supabaseClient.auth.signOut();
  currentUser = null;
  profile = null;
  libraryLoaded = false;
  EXAM_LIBRARY = [];
  flashProgressMsg = null;
  flashOnlineAttempts = null;
  flashSelectedAttemptIds = new Set();
  flashPickOpen = false;
  /* showView('auth') (called next, inside applyAccessGate) never touches
     the URL -- 'auth' isn't a routed view -- so without this the address
     bar is left sitting on whatever tab was open (e.g. /progress).
     Signing back in would then read that leftover path as if it were a
     deep link and land back on the same tab instead of defaulting to
     Take Exam. Resetting it here, specifically on sign-out, still leaves
     a genuine deep link (bookmarking /admin and signing in for the first
     time) intact, since that path was never "left over" from an active
     session in the first place. */
  if(location.pathname !== '/') history.pushState({view: 'quiz'}, '', '/');
  /* applyAccessGate() resets authScreen/authError/authMessage to a blank
     signin state as part of handling the signed-out case -- so any
     reason-specific message has to be set AFTER it runs, not before, or
     it gets immediately overwritten. */
  await applyAccessGate();
  if(reason === 'inactivity'){
    authMessage = "You were signed out after an hour of inactivity.";
    renderAuthView();
  }
}

/* ================= ACCESS GATE =================
   Nothing in #appShell (Offline mode included) is reachable without
   being signed in AND approved. This is the single choke point that
   decides whether the app or the sign-in/pending screen shows -- see
   applyAccessGate() below, called on every auth event (including the
   initial session restore on page load) and once explicitly at boot. */

async function refreshProfile(){
  if(!currentUser){ profile = null; return; }
  const { data, error } = await supabaseClient.from('profiles').select('*').eq('user_id', currentUser.id).maybeSingle();
  profile = error ? null : data;
}

/* device_type is a coarse, client-supplied label (phone/computer/other)
   used only for display context in the admin tab -- it never gates a
   flag, so its coarseness doesn't matter. The actual device/rate flags
   are keyed off the caller's real IP address, captured server-side in
   log_sign_in()/get_exam_library() -- not something the client computes
   or sends, so unlike the old browser-fingerprint hash it can't be
   spoofed from here and doesn't get manufactured into a "new device" by
   a routine browser auto-update. */
function computeDeviceType(){
  const ua = navigator.userAgent || '';
  if(/Mobi|Android|iPhone|iPad|iPod/i.test(ua)) return 'phone';
  if(/Windows|Macintosh|Linux|X11/i.test(ua)) return 'computer';
  return 'other';
}
async function logSignInEvent(){
  try{ await supabaseClient.rpc('touch_last_seen'); }catch(e){ /* best-effort */ }
  try{
    await supabaseClient.rpc('log_sign_in', { device_type: computeDeviceType() });
  }catch(e){ /* best-effort */ }
}

/* ================= inactivity timeout =================
   Supabase's own client keeps refreshing the access token in the
   background for as long as a tab stays open, regardless of whether the
   person is actually touching anything -- so "log out after an hour of
   no activity" has to be enforced here, watching for real mouse/keyboard/
   touch events, not derived from token/session state. The last-activity
   timestamp is kept in localStorage (shared across every tab of this
   origin) rather than a plain JS variable, so using the app in one tab
   correctly keeps an idle second tab from timing out on its own --
   without that, each tab would run an independent clock and an idle tab
   could sign the person out everywhere while they were actively using a
   different tab. */
const INACTIVITY_TIMEOUT_MS = 60 * 60 * 1000; // 1 hour
const INACTIVITY_STORAGE_KEY = 'nha_last_activity';
let inactivityCheckInterval = null;
let lastActivityWriteAt = 0;

function registerActivity(){
  if(!currentUser) return;
  const now = Date.now();
  if(now - lastActivityWriteAt < 5000) return; // throttle localStorage writes
  lastActivityWriteAt = now;
  try{ localStorage.setItem(INACTIVITY_STORAGE_KEY, String(now)); }catch(e){ /* storage unavailable -- fine, just skip */ }
}
['mousedown','mousemove','keydown','scroll','touchstart','click'].forEach(evt=>{
  document.addEventListener(evt, registerActivity, { passive: true });
});

/* True if the stored last-activity timestamp is more than an hour old.
   No stored timestamp at all is NOT staleness -- treated as "just started",
   not "expired". */
function isInactivityStale(){
  let last = 0;
  try{ last = parseInt(localStorage.getItem(INACTIVITY_STORAGE_KEY) || '0', 10); }catch(e){ return false; }
  return last > 0 && Date.now() - last > INACTIVITY_TIMEOUT_MS;
}

/* Checks immediately, for when access is already granted and something
   just made "how long has it been" worth re-asking right now (tab regains
   visibility, or the once-a-minute interval below) -- rather than only
   finding out next time the periodic interval happens to fire. A backgrounded
   tab's timers can be throttled or fully frozen by the browser, so without
   the visibilitychange listener specifically, a person who tabs away for
   over an hour and comes back would keep seeing the signed-in screen until
   *something* re-triggers a check. */
async function checkInactivityNow(){
  if(!currentUser || appShell.style.display === 'none') return;
  if(isInactivityStale()) await handleSignOut('inactivity');
}
document.addEventListener('visibilitychange', ()=>{
  if(!document.hidden) checkInactivityNow();
});

function startInactivityWatch(){
  if(inactivityCheckInterval) return; // already running
  try{
    if(!localStorage.getItem(INACTIVITY_STORAGE_KEY)) localStorage.setItem(INACTIVITY_STORAGE_KEY, String(Date.now()));
  }catch(e){ /* fine, will just check again next tick */ }
  inactivityCheckInterval = setInterval(checkInactivityNow, 60 * 1000); // check once a minute while the tab stays foregrounded and open -- doesn't need to be exact to the second
}
function stopInactivityWatch(){
  if(inactivityCheckInterval){ clearInterval(inactivityCheckInterval); inactivityCheckInterval = null; }
}

/* While parked on the "Awaiting Approval" screen, re-run the same gate
   check an admin approval would need anyway -- so approval takes effect
   on its own instead of requiring a manual sign-out/sign-in to notice. */
let approvalCheckInterval = null;
function startApprovalWatch(){
  if(approvalCheckInterval) return; // already running
  approvalCheckInterval = setInterval(()=>{ applyAccessGate(); }, 30 * 1000);
}
function stopApprovalWatch(){
  if(approvalCheckInterval){ clearInterval(approvalCheckInterval); approvalCheckInterval = null; }
}

/* The exam library is fetched exactly once per page load, right after
   the gate passes, from the get_exam_library() RPC -- server-enforced
   approval check, per-caller watermark, access logged server-side. */
async function fetchExamLibrary(){
  if(libraryLoaded || libraryLoading) return;
  libraryLoading = true;
  try{
    const { data, error } = await supabaseClient.rpc('get_exam_library');
    if(error) throw error;
    EXAM_LIBRARY = data;
    libraryLoaded = true;
  } catch(err){
    examSub.textContent = 'Could not load exam library: ' + err.message;
  } finally {
    libraryLoading = false;
  }
}

async function applyAccessGate(authEvent){
  if(pendingPasswordRecovery && authEvent !== 'PASSWORD_RECOVERY'){
    /* Neither grant access nor show the normal sign-in form -- both would
       be a confusing flash of the wrong screen while the recovery link's
       own validation is still in flight. See pendingPasswordRecovery's
       declaration for why this race exists at all. */
    appShell.style.display = 'none';
    authView.style.display = 'block';
    authPanel.innerHTML = '<h2>Verifying your reset link…</h2>';
    return;
  }
  if(!currentUser){
    stopInactivityWatch();
    stopApprovalWatch();
    appShell.style.display = 'none';
    /* examTitle/examSub sit outside #appShell entirely (page furniture,
       not part of the gated content) -- loadExam() sets them straight to
       whatever exam was in progress, so without resetting them here a
       sign-out mid-exam would leave the last exam's title/progress
       showing right above the sign-in form. */
    examTitle.textContent = 'Exam Practice Tool';
    examSub.textContent = '';
    if(authScreen !== 'reset-password'){ authScreen = 'signin'; authError=''; authMessage=''; }
    showView('auth');
    return;
  }
  await refreshProfile();
  const granted = !!profile && (profile.approved === true || profile.role === 'admin');
  if(!granted){
    stopInactivityWatch();
    startApprovalWatch();
    appShell.style.display = 'none';
    examTitle.textContent = 'Exam Practice Tool';
    examSub.textContent = '';
    showView('auth'); // renderAuthView() renders the pending-approval branch for this case
    return;
  }
  stopApprovalWatch();
  /* onAuthStateChange can fire more than once during a single page load
     (e.g. an initial session restore followed by a token refresh) --
     capture whether we were already showing the gated app BEFORE this
     pass, so a redundant re-fire doesn't bounce the user back to quiz (or,
     worse, stomp a deep-linked URL back to '/') on top of whatever screen
     they're already looking at. */
  const wasGranted = appShell.style.display !== 'none';
  let initialView = null;
  if(!wasGranted){
    /* A genuine fresh sign-in (the SIGNED_IN event -- someone just typed
       their password) overwrites any stale timestamp left over from a
       previous inactivity timeout, so it doesn't immediately trip the very
       next check and sign them right back out seconds after signing in.
       Any other event reaching here (INITIAL_SESSION on page load,
       TOKEN_REFRESHED, a plain refresh) means an already-active session is
       just being restored, not a fresh sign-in -- that path used to
       unconditionally reset the same clock regardless of how long the
       person had actually been away, which meant refreshing could extend
       an idle session forever and also caused the signed-in screen to
       flash before the periodic check eventually caught up and signed
       them out. Checking staleness for real here, before appShell is ever
       shown, closes both. */
    if(authEvent === 'SIGNED_IN'){
      try{ localStorage.setItem(INACTIVITY_STORAGE_KEY, String(Date.now())); }catch(e){ /* storage unavailable -- fine, will just re-seed on next check */ }
    } else if(isInactivityStale()){
      await handleSignOut('inactivity');
      return;
    }
    initialView = VIEW_FOR_PATH[location.pathname] || null;
    if(initialView === 'admin' && profile.role !== 'admin') initialView = null;
  }
  startInactivityWatch();
  tabAdmin.style.display = profile.role === 'admin' ? '' : 'none';
  if(initialView && initialView !== 'quiz'){
    /* Hide the default quiz view immediately, before the exam-library fetch
       below -- quizView has no inline display:none in the markup, so
       without this a refresh/deep-link into another tab would flash the
       quiz view on screen for the length of that fetch before showView()
       swaps to the actually-routed one. Same problem, separately, for the
       tab bar itself: tabQuiz starts with class="active" hardcoded in the
       markup, and nothing corrects that until showView() runs at the very
       end of this function (after the fetch below) -- without updating it
       here too, the nav bar keeps visibly highlighting "Take Exam" for the
       length of that fetch even though the correct panel is already
       showing underneath, which reads as the page flashing back to Take
       Exam even when the content itself never did. */
    quizView.style.display = 'none';
    tabQuiz.classList.remove('active');
    if(initialView==='flash'){ flashView.style.display = 'block'; tabFlash.classList.add('active'); }
    else if(initialView==='library'){ libraryView.style.display = 'block'; tabLibrary.classList.add('active'); }
    else if(initialView==='progress'){ progressView.style.display = 'block'; tabProgress.classList.add('active'); }
    else if(initialView==='admin'){ adminView.style.display = 'block'; tabAdmin.classList.add('active'); }
  }
  appShell.style.display = '';
  renderStatusBar();
  if(!libraryLoaded){
    examSub.textContent = 'Loading exam library…';
    await fetchExamLibrary();
  }
  renderEmptyState();
  if(!wasGranted){
    showView(initialView || 'quiz', initialView ? { fromPopState: true } : undefined);
  }
}

supabaseClient.auth.onAuthStateChange((event, session) => {
  currentUser = session ? session.user : null;
  if(event === 'PASSWORD_RECOVERY'){
    pendingPasswordRecovery = false;
    authScreen = 'reset-password'; authError=''; authMessage='';
    appShell.style.display = 'none';
    showView('auth');
    return;
  }
  if(event === 'SIGNED_IN'){ logSignInEvent(); }
  applyAccessGate(event);
});

tabProgress.onclick = ()=> showView('progress');

/* ================= ONLINE MODE: DB read/write =================
   Thin persistence adapter around the three online-mode tables. Mirrors
   offlineStore's role: the funnel methodology itself still lives only in
   funnelEngine (shared), this just moves round/attempt/answer rows to and
   from Supabase instead of the in-memory offlineRounds array. */
let activeOnlineRound = null;
let activeOnlineAttempt = null;

const onlineStore = {
  async findLatestRound(examKey){
    const { data, error } = await supabaseClient.from('exam_rounds')
      .select('*').eq('user_id', currentUser.id).eq('exam_key', examKey)
      .order('round_number', { ascending: false }).limit(1).maybeSingle();
    if(error) throw error;
    return data;
  },
  async findResumableAttempt(roundId){
    const { data, error } = await supabaseClient.from('exam_attempts')
      .select('*').eq('round_id', roundId).eq('status','in_progress')
      .order('attempt_number', { ascending: false }).limit(1).maybeSingle();
    if(error) throw error;
    return data;
  },
  async fetchAnswers(attemptId){
    const { data, error } = await supabaseClient.from('exam_attempt_answers')
      .select('*').eq('attempt_id', attemptId).order('question_index');
    if(error) throw error;
    return data;
  },
  async createRound(examKey, examTitle, originalTotal, priorRoundNumber){
    const { data, error } = await supabaseClient.from('exam_rounds').insert({
      user_id: currentUser.id, exam_key: examKey, exam_title: examTitle,
      round_number: (priorRoundNumber||0)+1, original_total: originalTotal, funnel_missed_count: originalTotal
    }).select().single();
    if(error) throw error;
    return data;
  },
  async abandonRound(roundId){
    const { error } = await supabaseClient.from('exam_rounds')
      .update({ status:'abandoned', updated_at: new Date().toISOString() }).eq('id', roundId);
    if(error) throw error;
  },
  /* Inserts the attempt row plus a full question snapshot (selected_option
     null) up front — so a round abandoned before the user answers even one
     question is still fully resumable from the DB, not just from whatever
     happens to have been clicked so far. */
  async createAttemptWithQuestions(roundId, attemptNumber, scope, sourceAttemptId, questions){
    const { data: attempt, error } = await supabaseClient.from('exam_attempts').insert({
      round_id: roundId, user_id: currentUser.id, attempt_number: attemptNumber,
      attempt_scope: scope, source_attempt_id: sourceAttemptId, total_questions: questions.length
    }).select().single();
    if(error) throw error;
    const rows = questions.map((q,i)=>({
      attempt_id: attempt.id, user_id: currentUser.id, question_index: i,
      question_text: q.text, options: q.options, correct_option: q.correct,
      explanation: q.explanation || '', original_number: q.originalNumber || (i+1),
      selected_option: null, flagged: false
    }));
    const { error: insErr } = await supabaseClient.from('exam_attempt_answers').insert(rows);
    if(insErr) throw insErr;
    return attempt;
  },
  async discardAttempt(attemptId){
    const { error } = await supabaseClient.from('exam_attempts').delete().eq('id', attemptId);
    if(error) throw error;
  },
  async saveAnswer(attemptId, questionIndex, selected, flagged){
    const { error } = await supabaseClient.from('exam_attempt_answers')
      .update({ selected_option: (selected===undefined||selected===null) ? null : selected, flagged: !!flagged })
      .eq('attempt_id', attemptId).eq('question_index', questionIndex);
    if(error) console.error('Online answer save failed:', error.message);
  },
  async saveAllAnswers(attemptId, answersList){
    await Promise.all(answersList.map(a =>
      supabaseClient.from('exam_attempt_answers')
        .update({ selected_option: a.selected, flagged: a.flagged })
        .eq('attempt_id', attemptId).eq('question_index', a.questionIndex)
    ));
  },
  async completeAttempt(attemptId, correctCount){
    const { error } = await supabaseClient.from('exam_attempts')
      .update({ status:'completed', correct_count: correctCount, completed_at: new Date().toISOString() })
      .eq('id', attemptId);
    if(error) throw error;
  },
  /* Explicitly sets status both ways (not just forward to 'mastered') --
     funnel state used to only ever narrow, but deleteAttemptFromProgress()
     can now un-master a round by removing the attempt that had cleared the
     threshold, and a stale 'mastered' badge with a non-mastered count would
     be actively misleading. */
  async updateRound(roundId, funnelMissedCount, mastered, masteredAt){
    const patch = {
      funnel_missed_count: funnelMissedCount, updated_at: new Date().toISOString(),
      status: mastered ? 'mastered' : 'in_progress', mastered_at: mastered ? masteredAt : null
    };
    const { error } = await supabaseClient.from('exam_rounds').update(patch).eq('id', roundId);
    if(error) throw error;
  },
  async deleteRound(roundId){
    const { error } = await supabaseClient.from('exam_rounds').delete().eq('id', roundId);
    if(error) throw error;
  },
  /* Round lookup/creation by an EXACT round number (as opposed to
     findLatestRound/createRound's "next after latest" logic) -- used when
     reconstructing round history from an uploaded PDF, which names the
     specific round it belongs to rather than always meaning "start a new
     one." */
  async findRoundByNumber(examKey, roundNumber){
    const { data, error } = await supabaseClient.from('exam_rounds')
      .select('*').eq('user_id', currentUser.id).eq('exam_key', examKey).eq('round_number', roundNumber).maybeSingle();
    if(error) throw error;
    return data;
  },
  async createRoundWithNumber(examKey, examTitle, originalTotal, roundNumber){
    const { data, error } = await supabaseClient.from('exam_rounds').insert({
      user_id: currentUser.id, exam_key: examKey, exam_title: examTitle,
      round_number: roundNumber, original_total: originalTotal, funnel_missed_count: originalTotal
    }).select().single();
    if(error) throw error;
    return data;
  },
  async findAttemptByNumber(roundId, attemptNumber){
    const { data, error } = await supabaseClient.from('exam_attempts')
      .select('*').eq('round_id', roundId).eq('attempt_number', attemptNumber).maybeSingle();
    if(error) throw error;
    return data;
  },
  async maxAttemptNumber(roundId){
    const { data, error } = await supabaseClient.from('exam_attempts')
      .select('attempt_number').eq('round_id', roundId).order('attempt_number', { ascending: false }).limit(1).maybeSingle();
    if(error) throw error;
    return data ? data.attempt_number : 0;
  }
};

/* Small 2-button prompt (Continue / Start Fresh), same visual language as
   showConfirmDialog but with two non-destructive-looking choices instead of
   a single confirm/cancel pair. */
function askContinueOrFresh(examTitleText){
  return new Promise(resolve=>{
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(31,36,34,.4);display:flex;align-items:center;justify-content:center;z-index:9999;font-family:system-ui,sans-serif;padding:20px;';
    overlay.innerHTML = `
      <div style="background:#fff;border-radius:12px;padding:22px 24px;max-width:380px;box-shadow:0 8px 30px rgba(0,0,0,.25);">
        <div style="font-size:.95rem;line-height:1.5;margin-bottom:18px;color:#1f2422;">You have an unfinished attempt on "${escapeHtml(examTitleText)}". Continue where you left off, or start fresh?</div>
        <div style="display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;">
          <button id="startFreshBtn" style="font-family:system-ui,sans-serif;border:1px solid #e3e0d8;background:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:.88rem;">Start Fresh</button>
          <button id="continueBtn" style="font-family:system-ui,sans-serif;border:none;background:#2f6f5e;color:#fff;border-radius:8px;padding:8px 14px;cursor:pointer;font-weight:600;font-size:.88rem;">Continue</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.querySelector('#startFreshBtn').onclick = ()=>{ overlay.remove(); resolve('fresh'); };
    overlay.querySelector('#continueBtn').onclick = ()=>{ overlay.remove(); resolve('continue'); };
  });
}

async function resumeOnlineAttempt(round, attempt, examData){
  const rows = await onlineStore.fetchAnswers(attempt.id);
  const questions = rows.map(r=>({ text: r.question_text, options: r.options, correct: r.correct_option, explanation: r.explanation || '', originalNumber: r.original_number }));
  activeOnlineRound = round;
  activeOnlineAttempt = attempt;
  exam = { title: examData.title, subtitle: examData.subtitle, questions, examKey: examData.examKey };
  answers = {}; flags = {};
  rows.forEach((r,i)=>{
    if(r.selected_option!==null && r.selected_option!==undefined) answers[i] = r.selected_option;
    if(r.flagged) flags[i] = true;
  });
  current = 0; submitted = false; currentAttempt = attempt.attempt_number;
  examTitle.textContent = exam.title;
  examSub.textContent = (exam.subtitle ? exam.subtitle + " · " : "") + exam.questions.length + " questions";
  dotsPanel.style.display = '';
  showView('quiz');
  renderQuestion();
  renderDots();
}

/* Online counterpart to beginTrackedAttempt's offline branch: always starts
   a fresh round (see the offline retakeBtn comment for why "fresh full
   attempt" = next round), except it first checks for a resumable unfinished
   attempt and asks the user before discarding it. */
async function beginOnlineAttempt(examData){
  const latest = await onlineStore.findLatestRound(examData.examKey);
  if(latest && latest.status === 'in_progress'){
    const resumable = await onlineStore.findResumableAttempt(latest.id);
    if(resumable){
      const choice = await askContinueOrFresh(examData.title);
      if(choice === 'continue'){
        await resumeOnlineAttempt(latest, resumable, examData);
        return;
      }
      await onlineStore.discardAttempt(resumable.id);
    }
    await onlineStore.abandonRound(latest.id);
  }
  const priorRoundNumber = latest ? latest.round_number : 0;
  const round = await onlineStore.createRound(examData.examKey, examData.title, examData.questions.length, priorRoundNumber);
  activeOnlineRound = round;
  activeOnlineAttempt = await onlineStore.createAttemptWithQuestions(round.id, 1, 'full', null, examData.questions);
  loadExam(examData);
}

/* Fire-and-forget per-answer save so an online attempt is always resumable
   from the DB, not just recoverable at submit time. */
function syncOnlineAnswer(index){
  if(!activeOnlineAttempt) return;
  onlineStore.saveAnswer(activeOnlineAttempt.id, index, answers[index], !!flags[index]);
}

async function completeOnlineAttempt(){
  if(!activeOnlineRound || !activeOnlineAttempt) return;
  const virtualAttempt = { answers: [] };
  funnelEngine.recordAnswers(virtualAttempt, exam.questions, answers, flags);
  const virtualRound = { originalTotal: activeOnlineRound.original_total, attempts: [] };
  funnelEngine.completeAttempt(virtualRound, virtualAttempt);

  await onlineStore.saveAllAnswers(activeOnlineAttempt.id, virtualAttempt.answers);
  await onlineStore.completeAttempt(activeOnlineAttempt.id, virtualAttempt.correctCount);
  const mastered = virtualRound.status === 'mastered';
  await onlineStore.updateRound(activeOnlineRound.id, virtualRound.funnelMissedCount, mastered, virtualRound.masteredAt);

  activeOnlineRound.funnel_missed_count = virtualRound.funnelMissedCount;
  if(mastered){ activeOnlineRound.status = 'mastered'; activeOnlineRound.mastered_at = virtualRound.masteredAt; }
  activeOnlineAttempt.status = 'completed';
}

window.addEventListener('beforeunload', (e)=>{
  if(appMode==='online' && activeOnlineAttempt && activeOnlineAttempt.status !== 'completed' && !submitted){
    e.preventDefault();
    e.returnValue = '';
  }
});


/* ================= ONLINE MODE: progress tracking view ================= */
let progressData = null;
let progressExpandedRoundId = null;
let progressAttemptView = null; // { questions, answersMap } while drilled into one attempt's review
let progressSortMode = 'name'; // 'name' | 'last' | 'first'

function sortProgressExams(exams, mode){
  const sorted = exams.slice();
  if(mode === 'last') sorted.sort((a,b)=> b.lastAttemptAt - a.lastAttemptAt);
  else if(mode === 'first') sorted.sort((a,b)=> a.firstAttemptAt - b.firstAttemptAt);
  /* 'name': numeric-aware so "Exam 2" sorts before "Exam 11" -- a plain
     string sort would otherwise order every exam past 9 lexicographically
     ("Exam 1", "Exam 11", "Exam 12", ..., "Exam 2", "Exam 9"). */
  else sorted.sort((a,b)=> a.examTitle.localeCompare(b.examTitle, undefined, { numeric: true, sensitivity: 'base' }));
  return sorted;
}

async function renderProgressView(){
  progressAttemptView = null;
  progressExpandedRoundId = null;
  progressPanel.innerHTML = `<h2>Progress</h2><div class="format-help">Loading…</div>`;
  try{
    const { data: rounds, error: roundsErr } = await supabaseClient.from('exam_rounds')
      .select('*').eq('user_id', currentUser.id).order('exam_title').order('round_number');
    if(roundsErr) throw roundsErr;
    let attempts = [];
    let answerCountByAttempt = {};
    if(rounds.length){
      const { data: attemptRows, error: attErr } = await supabaseClient.from('exam_attempts')
        .select('*').in('round_id', rounds.map(r=>r.id)).order('attempt_number');
      if(attErr) throw attErr;
      attempts = attemptRows;
      if(attempts.length){
        const answerRows = await fetchAllByIn('exam_attempt_answers', 'attempt_id', attempts.map(a=>a.id), 'attempt_id');
        answerRows.forEach(r=>{ answerCountByAttempt[r.attempt_id] = (answerCountByAttempt[r.attempt_id]||0) + 1; });
      }
    }
    const examsMap = {};
    rounds.forEach(r=>{
      if(!examsMap[r.exam_key]) examsMap[r.exam_key] = { examKey: r.exam_key, examTitle: r.exam_title, rounds: [] };
      const roundAttempts = attempts.filter(a=>a.round_id===r.id)
        .map(a=>{
          const answerCount = answerCountByAttempt[a.id] || 0;
          return { ...a, hasAnswers: answerCount > 0 };
        });
      examsMap[r.exam_key].rounds.push({ ...r, attempts: roundAttempts });
    });
    /* Precompute each exam's earliest/most-recent attempt start time (across
       every round) once here, rather than on every sort-mode switch --
       feeds the Progress tab's "First Attempt"/"Last Attempt" sort options. */
    const examsList = Object.values(examsMap);
    examsList.forEach(ex=>{
      const starts = [];
      ex.rounds.forEach(r=>r.attempts.forEach(a=>{
        const t = a.started_at ? new Date(a.started_at).getTime() : NaN;
        if(!isNaN(t)) starts.push(t);
      }));
      ex.firstAttemptAt = starts.length ? Math.min(...starts) : 0;
      ex.lastAttemptAt = starts.length ? Math.max(...starts) : 0;
    });
    progressData = {
      totalRounds: rounds.length,
      masteredRounds: rounds.filter(r=>r.status==='mastered').length,
      exams: examsList
    };
  } catch(err){
    progressPanel.innerHTML = `<h2>Progress</h2><div class="msg err">Could not load progress: ${escapeHtml(err.message)}</div>`;
    return;
  }
  renderProgressPanel();
}

function renderProgressPanel(){
  if(progressAttemptView){ renderProgressAttemptDetail(); return; }
  const d = progressData;
  let html = `
    <h2>Progress</h2>
    <div class="progress-row" style="margin-bottom:14px;">
      <span>${d.exams.length} exam(s) started</span>
      <span>${d.masteredRounds} of ${d.totalRounds} round(s) mastered</span>
    </div>
    <div class="msg" id="progressMsg"></div>
  `;
  if(d.exams.length){
    html += `
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;font-family:system-ui,sans-serif;font-size:.85rem;color:var(--muted);">
        <select id="progressSortSelect" style="padding:8px 12px;border-radius:8px;border:1px solid var(--line);">
          <option value="name" ${progressSortMode==='name'?'selected':''}>Sort: Test Name</option>
          <option value="last" ${progressSortMode==='last'?'selected':''}>Sort: Last Attempt</option>
          <option value="first" ${progressSortMode==='first'?'selected':''}>Sort: First Attempt</option>
        </select>
      </div>
    `;
  } else {
    html += `<div class="format-help">No attempts yet — start an exam from the Test Library.</div>`;
  }
  sortProgressExams(d.exams, progressSortMode).forEach(ex=>{
    html += `<div class="subsection"><h3>${escapeHtml(ex.examTitle)}</h3>`;
    ex.rounds.forEach(r=>{
      /* Mastery badge fires only on the round's cumulative funnel score, never a single attempt's raw score */
      const masteryBadge = r.status==='mastered' ? '<span class="lib-badge verified" style="margin-left:8px;">Mastered</span>' : '';
      const expanded = progressExpandedRoundId === r.id;
      const masteredSoFar = r.original_total - r.funnel_missed_count;
      const masteredPct = ((masteredSoFar / r.original_total) * 100).toFixed(1);
      /* "Continue" needs a real question-level snapshot to work from
         (hasAnswers) -- a totals-only historical row (from the retired PDF
         importer; existing accounts may still have these) has none. That's
         covered two ways: either the latest attempt is itself completed
         with row data (a live-played attempt), or it's an in-progress
         attempt already staged with its question snapshot. Continue then
         either builds the NEXT attempt (completed
         case) or just resumes the staged/interrupted one (in-progress case).
         Abandoned rounds are included too -- "Retake Full Exam" abandons
         whatever round was active to start a fresh one, even if that round
         still had missed questions left; that shouldn't permanently lock it
         out of ever being finished off, just because a *different*, newer
         round exists (mastered or not). continueRoundFromProgress() flips
         status back to in_progress once you actually pick this back up. */
      const latestAttempt = r.attempts.length ? r.attempts.reduce((a,b)=> a.attempt_number > b.attempt_number ? a : b) : null;
      const canContinue = (r.status==='in_progress' || r.status==='abandoned') && latestAttempt && latestAttempt.hasAnswers &&
        (latestAttempt.status==='completed' ? r.funnel_missed_count > 0 : true);
      html += `
        <div class="lib-row" style="flex-direction:column;align-items:stretch;">
          <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;width:100%;cursor:pointer;" data-round-toggle="${r.id}">
            <div class="lib-info">
              <div class="lib-title">Round ${r.round_number}${masteryBadge}${r.status==='abandoned' ? ' <span class="lib-meta">(abandoned)</span>' : ''}</div>
              <div class="lib-meta">${masteredPct}% — ${masteredSoFar} of ${r.original_total} mastered so far · ${r.attempts.length} attempt(s)</div>
            </div>
            <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
              ${canContinue ? `<button class="btn btn-ghost" data-continue-round="${r.id}" style="padding:4px 10px;font-size:.8rem;">Continue (Missed Only)</button>` : ''}
              <span class="link-btn">${expanded ? 'Hide' : 'Show'} attempts</span>
            </div>
          </div>
        </div>
      `;
      if(expanded){
        html += `<div style="padding:4px 0 10px 14px;">`;
        /* Fill in any gap before an uploaded PDF's attempt number (e.g. round
           reconstructed starting at attempt 2 with no record of attempt 1)
           with an explicit placeholder, rather than silently starting the
           list at whatever attempt happened to be uploaded first. */
        const maxAttempt = r.attempts.length ? Math.max(...r.attempts.map(a=>a.attempt_number)) : 0;
        const byNumber = new Map(r.attempts.map(a=>[a.attempt_number, a]));
        for(let n=1; n<=maxAttempt; n++){
          const a = byNumber.get(n);
          if(!a){
            html += `
              <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-family:system-ui,sans-serif;font-size:.85rem;color:var(--muted);">
                <span>Attempt ${n} — not uploaded</span>
              </div>
            `;
            continue;
          }
          /* The parenthetical %, when shown, is cumulative mastery as of
             THIS attempt (toward the round's overall goal), not this
             attempt's own raw subset score -- a missed-only retake's
             correct_count/total_questions is only ever a fraction of the
             questions still outstanding, so showing that alone reads as a
             regression ("83%?") right where the round header nearby is
             already reporting cumulative progress. Derivable per-attempt
             with no extra state: total_questions - correct_count is exactly
             how many were still missed after that attempt. */
          const stillMissedAfter = a.total_questions - a.correct_count;
          const cumulativePct = ((r.original_total - stillMissedAfter) / r.original_total * 100).toFixed(1);
          /* Review only needs SOME row data. An attempt from the retired PDF
             importer that predates per-question backfill has none at all --
             worth saying explicitly rather than leaving blank space where a
             Review link would otherwise be. */
          const noReviewNote = (a.status==='completed' && !a.hasAnswers)
            ? `<span class="lib-meta" style="font-size:.78rem;">from an uploaded PDF — no detailed review available</span>` : '';
          html += `
            <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;padding:6px 0;font-family:system-ui,sans-serif;font-size:.85rem;">
              <span>Attempt ${a.attempt_number} (${a.attempt_scope==='full'?'full exam':'missed-only retake'}) — ${a.correct_count}/${a.total_questions}${a.status==='completed' ? ` (${cumulativePct}% cumulative)` : ' · in progress'}</span>
              <span style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
                ${noReviewNote}
                ${(a.status==='completed' && a.hasAnswers) ? `<button class="link-btn" data-review-attempt="${a.id}" data-exam-key="${escapeHtml(r.exam_key)}">Review</button>` : ''}
                <button class="link-btn" style="color:#b3401f;" data-delete-attempt="${a.id}" data-round-id="${r.id}" data-attempt-number="${a.attempt_number}">Delete</button>
              </span>
            </div>
          `;
        }
        html += `</div>`;
      }
    });
    html += `</div>`;
  });
  progressPanel.innerHTML = html;
  const sortSelect = document.getElementById('progressSortSelect');
  if(sortSelect) sortSelect.onchange = (e)=>{ progressSortMode = e.target.value; renderProgressPanel(); };
  progressPanel.querySelectorAll('[data-round-toggle]').forEach(el=>{
    el.onclick = ()=>{
      const id = el.dataset.roundToggle;
      progressExpandedRoundId = (progressExpandedRoundId === id) ? null : id;
      renderProgressPanel();
    };
  });
  progressPanel.querySelectorAll('[data-review-attempt]').forEach(el=>{
    el.onclick = async (ev)=>{
      ev.stopPropagation();
      await openAttemptReview(el.dataset.reviewAttempt, el.dataset.examKey);
    };
  });
  progressPanel.querySelectorAll('[data-continue-round]').forEach(el=>{
    el.onclick = async (ev)=>{
      ev.stopPropagation();
      const round = findRoundById(el.dataset.continueRound);
      if(round) await continueRoundFromProgress(round);
    };
  });
  progressPanel.querySelectorAll('[data-delete-attempt]').forEach(el=>{
    el.onclick = (ev)=>{
      ev.stopPropagation();
      const round = findRoundById(el.dataset.roundId);
      if(round) deleteAttemptFromProgress(el.dataset.deleteAttempt, parseInt(el.dataset.attemptNumber, 10), round);
    };
  });
}

function findRoundById(roundId){
  for(const ex of progressData.exams){
    const r = ex.rounds.find(r=>r.id===roundId);
    if(r) return r;
  }
  return null;
}

/* Deletes a single attempt (its exam_attempt_answers rows cascade via the
   FK). If it was the round's current highest attempt number, the round's
   funnel state was DRIVING off it -- walk backward to the next-highest
   COMPLETED attempt (skipping a dangling in_progress one, which was never
   part of the committed funnel) and recompute funnel_missed_count/mastery
   from that. If no attempts remain at all, the round itself is now just
   clutter and is deleted along with it, rather than left behind empty. */
function deleteAttemptFromProgress(attemptId, attemptNumber, round){
  showConfirmDialog(
    `Delete Attempt ${attemptNumber} on Round ${round.round_number} of "${round.exam_title}"? This can't be undone.`,
    async ()=>{
      const msg = document.getElementById('progressMsg');
      try{
        /* round.attempts is the snapshot renderProgressView() already
           fetched -- reuse it instead of a redundant query, to check
           whether the attempt being deleted was the round's current max. */
        const maxNumBefore = round.attempts.length ? Math.max(...round.attempts.map(a=>a.attempt_number)) : 0;
        const wasLatest = attemptNumber === maxNumBefore;
        await onlineStore.discardAttempt(attemptId);
        if(wasLatest){
          const maxNum = await onlineStore.maxAttemptNumber(round.id);
          if(!maxNum){
            await onlineStore.deleteRound(round.id);
          } else {
            let n = maxNum, driver = null;
            while(n >= 1 && !driver){
              const a = await onlineStore.findAttemptByNumber(round.id, n);
              if(a && a.status === 'completed') driver = a;
              n--;
            }
            if(driver){
              const stillMissed = driver.total_questions - driver.correct_count;
              const mastered = (round.original_total - stillMissed) / round.original_total >= MASTERY_THRESHOLD;
              await onlineStore.updateRound(round.id, stillMissed, mastered, mastered ? new Date().toISOString() : null);
            } else {
              /* every remaining attempt is still in_progress -- nothing
                 completed backs the funnel count anymore, so it reflects
                 no progress rather than stale numbers from what got deleted. */
              await onlineStore.updateRound(round.id, round.original_total, false, null);
            }
          }
        }
        await renderProgressView();
        const freshMsg = document.getElementById('progressMsg');
        if(freshMsg){ freshMsg.textContent = `Attempt ${attemptNumber} deleted.`; freshMsg.className = 'msg ok'; }
      } catch(err){
        if(msg){ msg.textContent = 'Could not delete: ' + err.message; msg.className = 'msg err'; }
      }
    },
    'Delete', true
  );
}

/* Two cases, both reachable from Progress instead of only right after
   doSubmit() on the same page load a live attempt just finished on:
   1. Latest attempt is COMPLETED with row data (played natively) -- build
      the next missed-only attempt from it, same as the results-screen
      "Retake Missed Only" button (mirrors its online branch).
   2. Latest attempt is already IN-PROGRESS with row data -- it was staged
      (not yet played) either by an interrupted live session or by the
      batch PDF importer reconstructing a round's history -- just resume it. */
async function continueRoundFromProgress(round){
  const msg = document.getElementById('progressMsg');
  try{
    /* Picking this back up is exactly what "abandoned" should stop meaning
       once you do it -- clear it before anything else so the round doesn't
       sit labeled "(abandoned)" in Progress while actively being played. */
    if(round.status === 'abandoned'){
      await onlineStore.updateRound(round.id, round.funnel_missed_count, false, null);
      round.status = 'in_progress';
    }
    const maxNum = await onlineStore.maxAttemptNumber(round.id);
    if(!maxNum) throw new Error('No attempts to continue from.');
    const latest = await onlineStore.findAttemptByNumber(round.id, maxNum);
    if(!latest) throw new Error('No attempts to continue from.');

    if(latest.status === 'in_progress'){
      await resumeOnlineAttempt(round, latest, {
        title: round.exam_title, subtitle: "from " + round.exam_title, examKey: round.exam_key
      });
      return;
    }

    const { data: rows, error } = await supabaseClient.from('exam_attempt_answers')
      .select('*').eq('attempt_id', latest.id).order('question_index');
    if(error) throw error;
    if(!rows.length){
      throw new Error("This round's latest attempt predates detailed answer tracking, so it can't be continued automatically — start a fresh round instead.");
    }
    const liveExplanations = libraryExplanationLookup(round.exam_key);
    const missedQs = rows.filter(r=>r.selected_option !== r.correct_option).map(r=>({
      text: r.question_text, options: r.options, correct: r.correct_option,
      explanation: (liveExplanations && liveExplanations.get(r.question_text)) || r.explanation || '',
      originalNumber: r.original_number
    }));
    if(!missedQs.length) throw new Error('No missed questions on the latest attempt — nothing to continue.');
    const nextAttemptNumber = maxNum + 1;
    activeOnlineRound = round;
    activeOnlineAttempt = await onlineStore.createAttemptWithQuestions(round.id, nextAttemptNumber, 'missed_retake', latest.id, missedQs);
    loadExam({ title: "Retake — Missed Questions", subtitle: "from " + round.exam_title, questions: missedQs, examKey: round.exam_key }, nextAttemptNumber);
  } catch(err){
    if(msg){ msg.textContent = 'Could not continue: ' + err.message; msg.className = 'msg err'; }
  }
}

async function openAttemptReview(attemptId, examKey){
  progressPanel.innerHTML = `<h2>Progress</h2><div class="format-help">Loading…</div>`;
  const { data: rows, error } = await supabaseClient.from('exam_attempt_answers')
    .select('*').eq('attempt_id', attemptId).order('question_index');
  if(error){ progressPanel.innerHTML = `<div class="msg err">${escapeHtml(error.message)}</div>`; return; }
  const liveExplanations = libraryExplanationLookup(examKey);
  const questions = rows.map(r=>({ text: r.question_text, options: r.options, correct: r.correct_option, explanation: (liveExplanations && liveExplanations.get(r.question_text)) || r.explanation || '', originalNumber: r.original_number }));
  const answersMap = {};
  rows.forEach((r,i)=>{ if(r.selected_option!==null && r.selected_option!==undefined) answersMap[i] = r.selected_option; });
  progressReviewFilter = 'missed';
  progressAttemptView = { questions, answersMap };
  renderProgressPanel();
}

function renderProgressAttemptDetail(){
  const { questions, answersMap } = progressAttemptView;
  const allIndices = questions.map((_,i)=>i);
  const missedIndices = allIndices.filter(i=>answersMap[i] !== questions[i].correct);
  const indices = progressReviewFilter==='all' ? allIndices : missedIndices;
  const heading = progressReviewFilter==='all'
    ? `All Questions (${allIndices.length})` : `Questions You Missed (${missedIndices.length})`;
  progressPanel.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:10px;">
      <h2 style="margin:0;">${heading}</h2>
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="toplinks" style="margin:0;">
          <button id="progressReviewMissedBtn" class="${progressReviewFilter==='missed'?'active':''}">Review Missed Only</button>
          <button id="progressReviewAllBtn" class="${progressReviewFilter==='all'?'active':''}">Review All</button>
        </div>
        <button class="btn btn-ghost" id="backToProgressBtn">← Back to Progress</button>
      </div>
    </div>
    ${renderReviewList(indices, questions, answersMap)}
  `;
  document.getElementById('backToProgressBtn').onclick = ()=>{ progressAttemptView = null; renderProgressPanel(); };
  document.getElementById('progressReviewMissedBtn').onclick = ()=>{ progressReviewFilter='missed'; renderProgressAttemptDetail(); };
  document.getElementById('progressReviewAllBtn').onclick = ()=>{ progressReviewFilter='all'; renderProgressAttemptDetail(); };
}

      const userEvents = events.filter(e=>e.user_id===p.user_id);
      const deviceDismissal = dismissalByUserType[p.user_id + ':device'];
      const rateDismissal = dismissalByUserType[p.user_id + ':rate'];

      /* Device-sharing flag: distinct real IP addresses (captured
         server-side in log_sign_in, not a client-computed hash) seen
         signing in over the trailing 7 days -- more than 2 is a
         meaningfully stronger signal of a shared password than the old
         browser-fingerprint count, since it can't be manufactured by a
         routine browser auto-update. Only sign-ins after a dismissal
         count, so dismissing clears the slate rather than requiring
         things to get "worse" than before. */
      const signIns = userEvents.filter(e=>e.event_type==='sign_in' && (!deviceDismissal || e.created_at > deviceDismissal.dismissed_at));
      const distinctIpsWeek = new Set(signIns.filter(e=>e.ip_address).map(e=>e.ip_address));
      const deviceFlag = distinctIpsWeek.size > 2;
      /* Breakdown by device_type for the admin-facing label only -- the
         flag itself still fires on total distinct IPs above, regardless
         of type mix, since two computers plus one phone is just as much
         evidence of sharing as three phones. */
      const phoneIpsWeek = new Set(signIns.filter(e=>e.ip_address && e.device_type==='phone').map(e=>e.ip_address));
      const computerIpsWeek = new Set(signIns.filter(e=>e.ip_address && e.device_type==='computer').map(e=>e.ip_address));
      const otherIpsWeek = new Set(signIns.filter(e=>e.ip_address && e.device_type!=='phone' && e.device_type!=='computer').map(e=>e.ip_address));

      /* Rate flag: get_exam_library() already debounces repeat fetches
         from the same user+IP within a 5-minute window server-side, so a
         flaky session re-authenticating and reloading no longer inflates
         this count the way it used to. Flag on multiple distinct IPs
         pulling in a day (sharing, regardless of volume) or a single IP
         pulling an unusually high number of times (raised from the old
         >5 threshold now that reload-storm noise is gone at the source). */
      const fetches = userEvents.filter(e=>e.event_type==='library_fetch' && e.created_at >= oneDayAgo && (!rateDismissal || e.created_at > rateDismissal.dismissed_at));
      const distinctIpsDay = new Set(fetches.filter(e=>e.ip_address).map(e=>e.ip_address));
      const perIpCount = {};
      fetches.forEach(e=>{ if(e.ip_address) perIpCount[e.ip_address] = (perIpCount[e.ip_address]||0) + 1; });
      const maxSingleIpFetches = Object.values(perIpCount).reduce((m,c)=>Math.max(m,c), 0);
      const rateFlag = p.role !== 'admin' && (distinctIpsDay.size > 1 || maxSingleIpFetches > 15);

      flagsByUser[p.user_id] = {
        deviceFlag, distinctIpCountWeek: distinctIpsWeek.size, deviceDismissed: !!deviceDismissal,
        phoneIpCountWeek: phoneIpsWeek.size, computerIpCountWeek: computerIpsWeek.size, otherIpCountWeek: otherIpsWeek.size,
        rateFlag, fetchesLast24h: fetches.length, distinctIpCountDay: distinctIpsDay.size, rateDismissed: !!rateDismissal
      };
    });
    adminData = { profiles, flagsByUser };
  } catch(err){
    adminPanel.innerHTML = `<h2>Admin</h2><div class="msg err">Could not load admin data: ${escapeHtml(err.message)}</div>`;
    return;
  }
  renderAdminPanel();
}

/* "2 phones, 1 computer" instead of a flat IP count -- distinguishes an
   account signed in from two different phones (worth a closer look) from
   one signed in from a phone and a laptop (probably just their own two
   devices), which a bare count can't tell apart. */
function describeDeviceBreakdown(flags){
  const parts = [];
  if(flags.phoneIpCountWeek) parts.push(`${flags.phoneIpCountWeek} phone${flags.phoneIpCountWeek>1?'s':''}`);
  if(flags.computerIpCountWeek) parts.push(`${flags.computerIpCountWeek} computer${flags.computerIpCountWeek>1?'s':''}`);
  if(flags.otherIpCountWeek) parts.push(`${flags.otherIpCountWeek} other device${flags.otherIpCountWeek>1?'s':''}`);
  return parts.length ? parts.join(', ') : `${flags.distinctIpCountWeek} IP addresses`;
}

/* Raw sign-in/library-fetch timeline for one account -- the actual
   evidence behind the device/rate flags, not just a computed count. */
async function renderAdminSecurityEvents(targetUserId){
  const targetProfile = adminData.profiles.find(p=>p.user_id===targetUserId);
  const label = targetProfile ? targetProfile.email : targetUserId;
  adminPanel.innerHTML = `<h2>Admin — Security events for ${escapeHtml(label)}</h2><div class="format-help">Loading…</div>`;
  try{
    const { data: rows, error } = await supabaseClient.from('security_events')
      .select('*').eq('user_id', targetUserId).order('created_at', { ascending: false }).limit(200);
    if(error) throw error;

    /* Label each distinct IP as "Phone 1"/"Phone 2"/"Computer 1" etc. instead
       of a bare device_type repeated on every row -- otherwise two different
       phones are both just "(phone)" and look identical in the timeline.
       Numbering is assigned in chronological (oldest-first) order of first
       appearance per device type. library_fetch rows have no device_type of
       their own, so they borrow the label from the same IP's sign-in, when
       one is present in this same 200-event window. */
    const chronological = [...rows].reverse();
    const ipDeviceType = {};
    chronological.forEach(e=>{
      if(e.event_type==='sign_in' && e.ip_address && e.device_type && !(e.ip_address in ipDeviceType)){
        ipDeviceType[e.ip_address] = e.device_type;
      }
    });
    const typeCounters = {};
    const ipLabel = {};
    chronological.forEach(e=>{
      if(!e.ip_address || e.ip_address in ipLabel) return;
      const type = e.device_type || ipDeviceType[e.ip_address];
      if(!type) return;
      typeCounters[type] = (typeCounters[type]||0) + 1;
      ipLabel[e.ip_address] = `${type.charAt(0).toUpperCase()}${type.slice(1)} ${typeCounters[type]}`;
    });

    const rowsHtml = rows.length ? rows.map(e=>{
      const label = e.ip_address ? ipLabel[e.ip_address] : null;
      return `
      <div class="lib-row">
        <div class="lib-info">
          <div class="lib-title">${e.event_type === 'sign_in' ? 'Sign-in' : 'Library fetch'}${label ? ` (${escapeHtml(label)})` : ''}</div>
          <div class="lib-meta">${new Date(e.created_at).toLocaleString()} · IP: ${escapeHtml(e.ip_address || 'unknown')}</div>
        </div>
      </div>
    `;
    }).join('') : `<div class="format-help">No security events recorded for this account.</div>`;
    adminPanel.innerHTML = `
      <h2>Admin — Security events for ${escapeHtml(label)}</h2>
      <button class="link-btn" id="backToAdminBtn">← Back to Admin</button>
      <div class="format-help" style="margin-top:12px;">Most recent 200 events, newest first — the evidence behind the device/rate flags.</div>
      ${rowsHtml}
    `;
    document.getElementById('backToAdminBtn').onclick = ()=>{ adminSecurityEventsUserId = null; renderAdminPanel(); };
  } catch(err){
    adminPanel.innerHTML = `
      <h2>Admin</h2>
      <div class="msg err">Could not load security events: ${escapeHtml(err.message)}</div>
      <button class="link-btn" id="backToAdminBtn">← Back to Admin</button>
    `;
    document.getElementById('backToAdminBtn').onclick = ()=>{ adminSecurityEventsUserId = null; renderAdminPanel(); };
  }
}

/* Reverses get_exam_library()'s watermarking scheme: each stamped question
   carries 32 invisible characters (U+200C=0, U+200D=1) encoding 8 hex
   characters of the target account's user id, 4 bits per character in
   least-significant-bit-first order (matching the SQL side's `for b in
   0..3` emission order) -- so bit 0 is the first character emitted per
   nibble, not the last. */
function decodeWatermark(text, profiles){
  const bits = [];
  for(const ch of text){
    const code = ch.codePointAt(0);
    if(code === 8204) bits.push(0);
    else if(code === 8205) bits.push(1);
  }
  if(bits.length < 32) return 'No watermark found (need at least 32 invisible marker characters in the pasted text).';
  let hex = '';
  for(let i=0;i<32;i+=4){
    const [b0,b1,b2,b3] = bits.slice(i,i+4);
    hex += (b0*1 + b1*2 + b2*4 + b3*8).toString(16);
  }
  const match = profiles.find(p=>p.user_id.replace(/-/g,'').startsWith(hex));
  return match ? `Matches account: ${match.email}` : `Decoded hex prefix "${hex}" — no matching account found among current profiles.`;
}

/* Deliberately a separate, simpler, read-only view rather than threading
   a target-user parameter through renderProgressView()/renderProgressPanel()
   above -- those wire up Continue/Delete/Export/Import against
   currentUser.id throughout, and admin oversight only needs to see scores
   and history, never mutate another account's data. Backed by the
   admin-read-all RLS policies, so it works identically for grandfathered
   and freshly-approved accounts. */
async function renderAdminUserProgress(targetUserId){
  const targetProfile = adminData.profiles.find(p=>p.user_id===targetUserId);
  const label = targetProfile ? targetProfile.email : targetUserId;
  adminPanel.innerHTML = `<h2>Admin — Progress for ${escapeHtml(label)}</h2><div class="format-help">Loading…</div>`;
  try{
    const { data: rounds, error: rErr } = await supabaseClient.from('exam_rounds')
      .select('*').eq('user_id', targetUserId).order('exam_title').order('round_number');
    if(rErr) throw rErr;
    let attempts = [];
    if(rounds.length){
      const { data: attemptRows, error: aErr } = await supabaseClient.from('exam_attempts')
        .select('*').in('round_id', rounds.map(r=>r.id)).order('attempt_number');
      if(aErr) throw aErr;
      attempts = attemptRows;
    }
    let html = `
      <h2>Admin — Progress for ${escapeHtml(label)}</h2>
      <button class="link-btn" id="backToAdminBtn">← Back to Admin</button>
    `;
    if(!rounds.length){
      html += `<div class="format-help">No online attempts for this account.</div>`;
    }
    const examsMap = {};
    rounds.forEach(r=>{
      if(!examsMap[r.exam_key]) examsMap[r.exam_key] = { examTitle: r.exam_title, rounds: [] };
      examsMap[r.exam_key].rounds.push({ ...r, attempts: attempts.filter(a=>a.round_id===r.id) });
    });
    Object.values(examsMap).forEach(ex=>{
      html += `<div class="subsection"><h3>${escapeHtml(ex.examTitle)}</h3>`;
      ex.rounds.forEach(r=>{
        const masteredSoFar = r.original_total - r.funnel_missed_count;
        const masteredPct = r.original_total ? ((masteredSoFar / r.original_total) * 100).toFixed(1) : '0.0';
        html += `
          <div class="lib-row">
            <div class="lib-info">
              <div class="lib-title">Round ${r.round_number} ${r.status==='mastered' ? '<span class="lib-badge verified">Mastered</span>' : r.status==='abandoned' ? '<span class="lib-meta">(abandoned)</span>' : ''}</div>
              <div class="lib-meta">${masteredPct}% — ${masteredSoFar} of ${r.original_total} mastered so far · ${r.attempts.length} attempt(s)</div>
            </div>
          </div>
        `;
        r.attempts.forEach(a=>{
          const pct = a.total_questions ? ((a.correct_count/a.total_questions)*100).toFixed(1) : '0.0';
          const attemptLabel = `${ex.examTitle} — Round ${r.round_number}, Attempt ${a.attempt_number}`;
          html += `<button class="link-btn" style="display:block;padding-left:14px;margin-top:2px;" data-review-attempt="${a.id}" data-review-label="${escapeHtml(attemptLabel)}">Attempt ${a.attempt_number} — ${a.correct_count}/${a.total_questions} (${pct}%)${a.status==='in_progress' ? ' · in progress' : ''}</button>`;
        });
      });
      html += `</div>`;
    });
    adminPanel.innerHTML = html;
    document.getElementById('backToAdminBtn').onclick = ()=>{ adminDrilldownUserId = null; renderAdminPanel(); };
    adminPanel.querySelectorAll('button[data-review-attempt]').forEach(btn=>{
      btn.onclick = ()=>{
        adminReviewFilter = 'missed';
        adminReviewAttempt = { id: btn.dataset.reviewAttempt, label: btn.dataset.reviewLabel };
        renderAdminPanel();
      };
    });
  } catch(err){
    adminPanel.innerHTML = `
      <h2>Admin</h2>
      <div class="msg err">Could not load progress: ${escapeHtml(err.message)}</div>
      <button class="link-btn" id="backToAdminBtn">← Back to Admin</button>
    `;
    document.getElementById('backToAdminBtn').onclick = ()=>{ adminDrilldownUserId = null; renderAdminPanel(); };
  }
}

/* Question-by-question breakdown of one attempt, for the admin drilldown.
   Reuses renderReviewList (the same renderer the account's own results
   screen uses) by reshaping exam_attempt_answers' snapshotted rows into
   the {text,options,correct,explanation}/answersMap shape it already
   accepts as overrides -- admin read access to this table comes from the
   "admin read all answers" RLS policy in 0003_access_control.sql, no new
   grant needed. */
async function renderAdminAttemptReview(reviewCtx){
  adminPanel.innerHTML = `<h2>Admin — ${escapeHtml(reviewCtx.label)}</h2><div class="format-help">Loading…</div>`;
  try{
    const { data: rows, error } = await supabaseClient.from('exam_attempt_answers')
      .select('*').eq('attempt_id', reviewCtx.id).order('question_index');
    if(error) throw error;
    const questions = rows.map(r=>({
      originalNumber: r.question_index + 1,
      text: r.question_text,
      options: r.options,
      correct: r.correct_option,
      explanation: r.explanation
    }));
    const answersMap = {};
    rows.forEach((r,i)=>{ if(r.selected_option !== null && r.selected_option !== undefined) answersMap[i] = r.selected_option; });
    const missed = questions.map((_,i)=>i).filter(i=>answersMap[i] !== questions[i].correct);
    const indices = adminReviewFilter==='all' ? questions.map((_,i)=>i) : missed;
    adminPanel.innerHTML = `
      <h2>Admin — ${escapeHtml(reviewCtx.label)}</h2>
      <button class="link-btn" id="backToUserProgressBtn">← Back</button>
      <div class="toplinks" style="margin-top:14px;">
        <button id="adminReviewMissedBtn" class="${adminReviewFilter==='missed'?'active':''}">Review Missed Only</button>
        <button id="adminReviewAllBtn" class="${adminReviewFilter==='all'?'active':''}">Review All</button>
      </div>
      ${renderReviewList(indices, questions, answersMap)}
    `;
    document.getElementById('backToUserProgressBtn').onclick = ()=>{ adminReviewAttempt = null; renderAdminPanel(); };
    document.getElementById('adminReviewMissedBtn').onclick = ()=>{ adminReviewFilter = 'missed'; renderAdminPanel(); };
    document.getElementById('adminReviewAllBtn').onclick = ()=>{ adminReviewFilter = 'all'; renderAdminPanel(); };
  } catch(err){
    adminPanel.innerHTML = `
      <h2>Admin</h2>
      <div class="msg err">Could not load attempt: ${escapeHtml(err.message)}</div>
      <button class="link-btn" id="backToUserProgressBtn">← Back</button>
    `;
    document.getElementById('backToUserProgressBtn').onclick = ()=>{ adminReviewAttempt = null; renderAdminPanel(); };
  }
}

}
/* Boot: deliberately do NOT call applyAccessGate() here. currentUser is
   still unknown at this point (onAuthStateChange hasn't fired yet), so
   calling it now would guess "signed out" and flash the sign-in form at
   every already-logged-in visitor before the real check corrects it a
   moment later -- worse than the brief neutral "Loading…" state (the
   static HTML's own default, both authView and appShell start hidden)
   that's already showing while we wait for the real answer. */
